<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WONML</title>

  <!-- iPhone full-screen web app settings -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="assets/branding/WONMLIcon.png">
  <link rel="apple-touch-icon" href="assets/branding/WONMLIcon-180.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #aee1ff 0, #4d7fbf 60%, #1e2a3a 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #f5f5f5;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .game-wrapper {
      position: relative;
      padding: 16px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.25);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
    }

    canvas {
      display: block;
      background: #6bb34d;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Baskerville, Georgia, serif;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
      font-size: 14px;
      line-height: 1.15;
      letter-spacing: 0.02em;
      pointer-events: none;
      max-width: 430px;
      color: #ffeb3b; /* bright yellow text */
    }

    .hud span.label {
      opacity: 0.9;
      font-weight: 600;
      margin-right: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffe082; /* softer yellow for labels */
    }

    #lives {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      letter-spacing: 0;
    }

    .life-badge {
      --badge-image: none;
      position: relative;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      display: inline-block;
      border: 1.4px solid rgba(63, 48, 28, 0.92);
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 251, 236, 0.9) 0, rgba(255, 251, 236, 0.52) 18%, rgba(255, 251, 236, 0) 38%),
        radial-gradient(circle at 50% 46%, rgba(207, 186, 141, 0.98) 0, rgba(132, 108, 73, 0.98) 68%, rgba(58, 44, 28, 0.98) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 246, 221, 0.65),
        inset 0 -1px 2px rgba(49, 36, 22, 0.58),
        0 1px 3px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .life-badge::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background-image: var(--badge-image);
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      filter: drop-shadow(0 0 1px rgba(27, 20, 12, 0.22));
    }

    .life-badge.is-lost {
      opacity: 0.28;
      filter: saturate(0.18) brightness(0.72);
      transform: scale(0.94);
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      opacity: 0.95;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      text-align: center;
      pointer-events: none;
      white-space: pre-line;
      color: #ffeb3b; /* better visibility */
    }

    .mute-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.55);
      color: #ffeb3b;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      z-index: 5;
    }

    .mute-btn:hover {
      background: rgba(0, 0, 0, 0.75);
    }

    .mute-btn.muted {
      color: #ccc;
    }
  </style>
</head>

      <div><span class="label">Pilot:</span><span id="currentPilot">-</span></div>
      <div><span class="label">Top Ace:</span><span id="bestPilot">-</span></div>
    </div>

    <div class="hint" id="hint">
      Tap a side to enter
    </div>

    <!-- Music controls + audio -->
    <button id="muteBtn" class="mute-btn">🔊</button>
    <audio id="bgmRun" src="assets/audio/bgm_run.mp3" loop></audio>

    function fillRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

      if (type === "dh9") return { img: dh9Img, loaded: dh9Loaded, scale: 0.056 };
      if (type === "pupstd") return { img: pupStdImg, loaded: pupStdLoaded, scale: 0.057 };
      return { img: d7StdImg, loaded: d7StdLoaded, scale: 0.058 };

      if (currentLevelIndex >= 3) return "pupstd";

      if (enemyType === "german-fighter") return getGermanFrontlinePlaneType();

    // Local fallback save (for offline / caching)
    function saveLeaderboard() {
      try {
        localStorage.setItem(STORAGE_KEYS.leaderboard, JSON.stringify(leaderboard));
      } catch (e) {
        console.log("Cannot save leaderboard locally:", e);
      }
    }

    // === Music state ===
    let bgmStarted = false;
    let bgmMuted = false;

    function startBgmIfNeeded() {
      if (!bgmRun || bgmStarted) return;
      bgmStarted = true;
      bgmRun.volume = 0.5;
      const p = bgmRun.play();
      if (p && p.catch) {
        p.catch(err => {
          console.log("Autoplay blocked, will retry after next input:", err);
          bgmStarted = false;
        });
      }
    }

    if (muteBtn && bgmRun) {
      muteBtn.addEventListener("click", () => {

        bgmRun.muted = bgmMuted;
        muteBtn.classList.toggle("muted", bgmMuted);
        muteBtn.textContent = bgmMuted ? "🔈" : "🔊";
      });
    }

    // === Load leaderboard from Supabase (global) ===
    async function initLeaderboard() {
      // 1) Local cache
      const raw = getStoredValue(STORAGE_KEYS.leaderboard, STORAGE_KEYS.legacyLeaderboard);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) leaderboard = parsed;
        } catch {
          leaderboard = [];
        }
      }

      // 2) Remote from Supabase
      try {
        const { data, error } = await sb
          .from("scores")
          .select("name, score")
          .order("score", { ascending: false })
          .limit(10);

        if (!error && Array.isArray(data)) {
          leaderboard = data.map(row => ({
            name: row.name || "Unknown",
            score: Number(row.score) || 0
          }));
          saveLeaderboard();
        } else if (error) {
          console.log("Supabase read error:", error.message);
        }
      } catch (err) {
        console.log("Online leaderboard not available, using local only.", err);
      }

      if (leaderboard.length > 0) {
        bestScore = leaderboard[0].score;
        bestPilotName = leaderboard[0].name || "-";
      }

      bestEl.textContent = bestScore;
      bestPilotEl.textContent = bestPilotName;

      if (screen === "splash") {
        drawSplash();
      }

        const badge = document.createElement("span");
        badge.className = "life-badge" + (i < lives ? "" : " is-lost");
        badge.style.setProperty("--badge-image", `url('${badgePath}')`);
        livesEl.appendChild(badge);
      }
    }

    function syncFactionWithPlane() {
      currentFaction = (planeType === "dh1" || planeType === "dh2" || planeType === "dh9" || planeType === "pupstd") ? "britain" : "germany";
    }

    function updateXpDisplay() {
      const progress = enemiesShotDown % XP_PER_ACE_STEP;
      const readyUnjams = Math.floor(xpPoints / UNJAM_XP_COST);
      xpEl.textContent = readyUnjams > 0
        ? `${xpPoints} (${progress}/${XP_PER_ACE_STEP}) U:${readyUnjams}`
        : `${xpPoints} (${progress}/${XP_PER_ACE_STEP})`;
    }

    function awardScore(points) {
      score += points;
      scoreEl.textContent = score;

      if (score > bestScore) {
        bestScore = score;
        bestPilotName = currentPilotName || bestPilotName || "Unknown";
        bestEl.textContent = bestScore;
        bestPilotEl.textContent = bestPilotName;
        localStorage.setItem(STORAGE_KEYS.best, String(bestScore));
        localStorage.setItem(STORAGE_KEYS.bestPilot, bestPilotName);
      }

      updateLevelByScore();
      checkUnlocks();
    }

    updateLivesDisplay();
    updateXpDisplay();

    function registerEnemyKill() {
      enemiesShotDown += 1;
      if (enemiesShotDown % XP_PER_ACE_STEP === 0) {
        xpPoints += 1;
      }
      updateXpDisplay();
    }

    function ensurePilotName() {
      if (!currentPilotName) {
        let name = prompt("Enter pilot name:", "");
        if (name) {
          name = name.trim();
        }
        if (!name) {
          name = "Unknown";
        }
        currentPilotName = name;
        currentPilotEl.textContent = currentPilotName;
        localStorage.setItem(STORAGE_KEYS.lastPilot, currentPilotName);
      }
    }

    // Update local + global leaderboard once per run
    async function updateLeaderboardForCurrentPilot() {
      if (!currentPilotName || score <= 0) return;

      const name = currentPilotName;
      const newScore = score;

      // 1) Update local leaderboard
      let entry = leaderboard.find(e => e.name === name);
      if (entry) {
        if (newScore > entry.score) {
          entry.score = newScore;
        }
      } else {
        leaderboard.push({ name, score: newScore });
      }

      leaderboard.sort((a, b) => b.score - a.score);
      if (leaderboard.length > 10) {
        leaderboard.length = 10;
      }

      saveLeaderboard();

      if (leaderboard.length > 0) {
        bestScore = leaderboard[0].score;
        bestPilotName = leaderboard[0].name || "-";
        bestEl.textContent = bestScore;
        bestPilotEl.textContent = bestPilotName;
        localStorage.setItem(STORAGE_KEYS.best, String(bestScore));
        localStorage.setItem(STORAGE_KEYS.bestPilot, bestPilotName);
      }

      // 2) Insert into Supabase (one row per run)
      try {
        const { error } = await sb
          .from("scores")
          .insert({ name, score: newScore });

        if (error) {
          console.log("Supabase write error:", error.message);
        }
      } catch (err) {
        console.log("Cannot submit score online (ignored):", err);
      }
    }

    function resetGame() {
      syncFactionWithPlane();
      plane = {
        x: PLANE_X,
        y: H / 2,
        width: PLANE_WIDTH,
        height: PLANE_HEIGHT,
        vy: 0,
        invincibleUntil: 0,
        hitRecoveryUntil: 0
      };
      obstacles = [];
      enemies = [];
      playerShots = [];
      score = 0;
      xpPoints = 0;
      enemiesShotDown = 0;
      lives = 3;
      damageLevel = 0;
      scoreSubmitted = false;
      scoreEl.textContent = score;
      updateLivesDisplay();
      updateXpDisplay();
      lastTime = 0;
      lastSpawnTime = 0;
      lastEnemySpawnTime = 0;
      lastEnemySpawnY = null;
      lastShotTime = 0;
      roundStartTime = 0;
      activeCampaignIntro = CAMPAIGN_INTROS.belgium;
      campaignIntroUntil = performance.now() + 4200;
      gameOver = false;
      gameRunning = false;
      currentLevelIndex = 0;
      levelNameEl.textContent = LEVELS[currentLevelIndex].name;
      parallax.far = 0;
      parallax.mid = 0;
      parallax.fore = 0;
    }

    function startGameLoop() {
      if (!gameRunning && !gameOver) {
        gameRunning = true;
        requestAnimationFrame(loop);
      }
    }

    function getDamageFlightState(timestamp = performance.now()) {
      let jumpMultiplier = 1;
      let speedMultiplier = 1;

      if (damageLevel === 1) {
        jumpMultiplier = 0.9;
        speedMultiplier = 0.97;
      } else if (damageLevel >= 2) {
        jumpMultiplier = 0.76;
        speedMultiplier = 0.9;
      }

      if (plane.hitRecoveryUntil && timestamp < plane.hitRecoveryUntil) {
        jumpMultiplier *= 0.94;
        speedMultiplier *= 0.96;
      }

      return { jumpMultiplier, speedMultiplier };
    }

    function flap() {
      const level = LEVELS[currentLevelIndex];
      const { jumpMultiplier } = getDamageFlightState();
      plane.vy = level.jump * jumpMultiplier;
    }

    function updateLevelByScore() {
      let newIndex = 0;
      if (score >= 145) newIndex = 3;
      else if (score >= 90) newIndex = 2;
      else if (score >= 45) newIndex = 1;
      else newIndex = 0;

      if (newIndex !== currentLevelIndex) {
        currentLevelIndex = newIndex;
        levelNameEl.textContent = LEVELS[currentLevelIndex].name;
      }
    }

    function checkUnlocks() {
      return;
    }

    function spawnObstacle(timestamp) {
      const level = LEVELS[currentLevelIndex];
      if (!level.obstacle || level.obstacle === "none") return;
      if (!lastSpawnTime) lastSpawnTime = timestamp;
      if (currentLevelIndex === 0 && timestamp - roundStartTime < 2200) return;
      if (timestamp - lastSpawnTime < level.spawnInterval) return;

      lastSpawnTime = timestamp;

      const marginTop = 80;
      const marginBottom = 80;
      const yMin = marginTop;
      const yMax = H - GROUND_HEIGHT - marginBottom;
      const baseY = Math.random() * (yMax - yMin) + yMin;

      const obstacleType = level.obstacle;

      const radius = obstacleType === "zeppelin" ? 40 : 26;

      obstacles.push({
        x: W + radius + 10,
        y: baseY,
        baseY,
        r: radius,
        type: obstacleType,
        scored: false,
        age: 0,
        phase: Math.random() * Math.PI * 2
      });
    }

    function chooseEnemyType() {
      const roll = Math.random();

      if (currentFaction === "britain") {
        if (currentLevelIndex >= 3 && roll > 0.76) return "zeppelin";
        return "german-fighter";
      }

      if (currentLevelIndex >= 3 && roll > 0.74) return "british-bomber";
      return "british-fighter";
    }

    function createEnemy(type, y) {
      const map = {
        "german-fighter": { width: 58, height: 24, speedFactor: 1.18, hp: 1, points: 3, missPenalty: 1, bobAmp: 8, bobFreq: 0.004 },
        "german-bomber": { width: 84, height: 30, speedFactor: 0.88, hp: 2, points: 5, missPenalty: 2, bobAmp: 5, bobFreq: 0.0028 },
        "british-fighter": { width: 58, height: 24, speedFactor: 1.16, hp: 1, points: 3, missPenalty: 1, bobAmp: 8, bobFreq: 0.0042 },
        "british-bomber": { width: 86, height: 30, speedFactor: 0.9, hp: 2, points: 5, missPenalty: 2, bobAmp: 5, bobFreq: 0.0028 },
        "zeppelin": { width: 126, height: 38, speedFactor: 0.62, hp: 3, points: 8, missPenalty: 3, bobAmp: 4, bobFreq: 0.0019 }
      };

      const base = map[type];
      return {
        x: W + base.width,
        y,
        baseY: y,
        width: base.width,
        height: base.height,
        speedFactor: base.speedFactor,
        type,
        hp: base.hp,
        points: base.points,
        missPenalty: base.missPenalty,
        bobAmp: base.bobAmp,
        bobFreq: base.bobFreq,
        phase: Math.random() * Math.PI * 2
      };
    }

    function pickEnemySpawnY(type) {
      const minY = type === "zeppelin" ? 90 : 70;
      const maxY = type === "zeppelin" ? H - GROUND_HEIGHT - 180 : H - GROUND_HEIGHT - 90;
      const playerCenterY = plane.y + plane.height / 2;
      const preferredSpacing = currentLevelIndex === 0 ? 90 : 58;
      const previousSpacing = type === "zeppelin" ? 110 : 70;

      let fallbackY = Math.random() * Math.max(20, maxY - minY) + minY;

      for (let attempt = 0; attempt < 6; attempt++) {
        const candidateY = Math.random() * Math.max(20, maxY - minY) + minY;
        fallbackY = candidateY;

        const clearsPlayerLane = Math.abs(candidateY - playerCenterY) >= preferredSpacing;
        const clearsPreviousLane = lastEnemySpawnY === null || Math.abs(candidateY - lastEnemySpawnY) >= previousSpacing;

        if (clearsPlayerLane && clearsPreviousLane) {
          return candidateY;
        }
      }

      return fallbackY;
    }

    function spawnEnemy(timestamp) {
      if (!lastEnemySpawnTime) lastEnemySpawnTime = timestamp;
      if (currentLevelIndex === 0 && timestamp - roundStartTime < 4200) return;

      const isOpeningLevel = currentLevelIndex === 0;
      const spawnBase = isOpeningLevel ? 3050 : 2500;
      const spawnFloor = isOpeningLevel ? 1780 : 1350;
      const scoreRamp = isOpeningLevel ? 3 : 7;
      const spawnEvery = Math.max(
        spawnFloor,
        spawnBase - currentLevelIndex * 230 - Math.min(score, 80) * scoreRamp
      );
      if (timestamp - lastEnemySpawnTime < spawnEvery) return;

      lastEnemySpawnTime = timestamp;

      const type = chooseEnemyType();
      const y = pickEnemySpawnY(type);
      lastEnemySpawnY = y;
      enemies.push(createEnemy(type, y));
    }

    function tryAutoFire(planeCx, planeCy, timestamp) {
      if (timestamp - lastShotTime < 320) return;

      const target = enemies.find(enemy =>
        enemy.x > planeCx &&
        enemy.x < planeCx + 220 &&
        Math.abs(enemy.y - planeCy) < (enemy.type === "zeppelin" ? 56 : 34)
      );

      if (!target) return;

      lastShotTime = timestamp;
      playerShots.push({
        x: planeCx + 18,
        y: planeCy,
        vx: 8.8,
        vy: 0,
        r: 4,
        ttl: 880
      });
    }

    function registerHit(timestamp) {
      if (plane.invincibleUntil && timestamp < plane.invincibleUntil) {
        return false;
      }

      plane.invincibleUntil = timestamp + 900;
      damageLevel = Math.min(3, damageLevel + 1);
      lives = Math.max(0, 3 - damageLevel);
      plane.hitRecoveryUntil = timestamp + (damageLevel === 1 ? 850 : 1200);
      updateLivesDisplay();

      if (damageLevel >= 3) {
        damageLevel = 3;
        lives = 0;
        updateLivesDisplay();
        endGame();
        return true;
      }
      return false;
    }

    function crashToGround() {
      damageLevel = 3;
      lives = 0;
      plane.hitRecoveryUntil = 0;
      updateLivesDisplay();
      endGame();
    }

    function update(dt, timestamp) {
      if (!roundStartTime) roundStartTime = timestamp;

      const level = LEVELS[currentLevelIndex];

      let levelSpeed = level.speed;

      if (currentLevelIndex === 3 && score >= 150) {
        const extraSteps = Math.floor((score - 150) / 50) + 1;
        const extra = extraSteps * 0.25;
        levelSpeed += extra;
      }

      let planeSpeedFactor = 1.0;
      if (planeType === "e3std") {
        planeSpeedFactor = 0.95;
      } else if (planeType === "dr1std") {
        planeSpeedFactor = 1.0;
      } else if (planeType === "d7std") {
        planeSpeedFactor = 1.03;
      } else if (planeType === "d7rb") {
        planeSpeedFactor = 1.03;
      } else if (planeType === "d7vik") {
        planeSpeedFactor = 1.03;
      } else if (planeType === "dh1") {
        planeSpeedFactor = 0.95;
      } else if (planeType === "dh2") {
        planeSpeedFactor = 1.0;
      } else if (planeType === "dh9") {
        planeSpeedFactor = 0.94;
      } else if (planeType === "pupstd") {
        planeSpeedFactor = 1.02;
      }

      planeSpeedFactor *= getDamageFlightState(timestamp).speedMultiplier;

      levelSpeed *= planeSpeedFactor;

      const speedFactor = dt / (1000 / 60);

      plane.vy += level.gravity * speedFactor;
      plane.y += plane.vy * speedFactor;

      spawnObstacle(timestamp);
      spawnEnemy(timestamp);

      for (const o of obstacles) {
        o.x -= levelSpeed * speedFactor;
        o.age += dt;

        let amp = 0;
        let freq = 0;
        if (o.type === "balloon") {
          amp = 10;
          freq = 0.003;
        } else if (o.type === "zeppelin") {
          amp = 6;
          freq = 0.002;
        }
        if (amp > 0) {
          o.y = o.baseY + Math.sin(timestamp * freq + o.phase) * amp;
        }
      }

      obstacles = obstacles.filter(o => o.x + o.r > -20);

      const enemyApproachFactor = currentLevelIndex === 0 ? 0.9 : 1.0;
      for (const enemy of enemies) {
        enemy.x -= levelSpeed * enemy.speedFactor * enemyApproachFactor * speedFactor;
        enemy.y = enemy.baseY + Math.sin(timestamp * enemy.bobFreq + enemy.phase) * enemy.bobAmp;
      }

      const planeCx = plane.x + plane.width / 2;
      const planeCy = plane.y + plane.height / 2;
      tryAutoFire(planeCx, planeCy, timestamp);

      for (const shot of playerShots) {
        shot.x += shot.vx * speedFactor;
        shot.y += shot.vy * speedFactor;
        shot.ttl -= dt;
      }

      playerShots = playerShots.filter(shot => shot.ttl > 0 && shot.x < W + 40);
      enemies = enemies.filter(enemy => enemy.x + enemy.width > -40);

      const base = levelSpeed * speedFactor;
      parallax.far -= base * 0.3;
      parallax.mid -= base * 0.6;
      parallax.fore -= base * 1.0;

      if (plane.y < 0 || plane.y + plane.height > H - GROUND_HEIGHT) {
        crashToGround();
        return;
      }

      let planeFactor = 0.56;
      if (planeType === "e3std") planeFactor = 0.56;
      if (planeType === "dr1std") planeFactor = 0.58;
      if (planeType === "d7std") planeFactor = 0.59;
      if (planeType === "d7rb") planeFactor = 0.59;
      if (planeType === "d7vik") planeFactor = 0.59;
      if (planeType === "dh1") planeFactor = 0.57;
      if (planeType === "dh2") planeFactor = 0.57;
      if (planeType === "dh9") planeFactor = 0.57;
      if (planeType === "pupstd") planeFactor = 0.58;
      const planeR = Math.min(plane.width, plane.height) * planeFactor;

      for (const o of obstacles) {
        const dx = planeCx - o.x;
        const dy = planeCy - o.y;
        const distSq = dx * dx + dy * dy;
        const rad = planeR + o.r + 1;
        if (distSq < rad * rad) {
          const gameEnded = registerHit(timestamp);
          if (gameEnded) return;
          plane.vy = -3;
        }

        if (!o.scored && o.x + o.r < plane.x) {
          o.scored = true;
          awardScore(1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const ex = enemy.x;
        const ey = enemy.y;
        const er = Math.max(enemy.width, enemy.height) * (enemy.type === "zeppelin" ? 0.38 : 0.29);

        if (enemy.x + enemy.width * 0.5 < plane.x) {
          awardScore(-enemy.missPenalty);
          enemies.splice(i, 1);
          continue;
        }

        const dx = planeCx - ex;
        const dy = planeCy - ey;
        if (dx * dx + dy * dy < (planeR + er) * (planeR + er)) {
          const gameEnded = registerHit(timestamp);
          enemies.splice(i, 1);
          if (gameEnded) return;
          plane.vy = -3;
          continue;
        }

        for (let j = playerShots.length - 1; j >= 0; j--) {
          const shot = playerShots[j];
          const hitDx = shot.x - ex;
          const hitDy = shot.y - ey;
          const hitR = er + shot.r;
          if (hitDx * hitDx + hitDy * hitDy <= hitR * hitR) {
            playerShots.splice(j, 1);
            enemy.hp -= 1;
            if (enemy.hp <= 0) {
              enemies.splice(i, 1);
              awardScore(enemy.points);
              registerEnemyKill();
            }
            break;
          }
        }
      }
    }

    function drawBackground() {
      const level = LEVELS[currentLevelIndex];
      const customLayers = level.parallax?.customLayers;

      ctx.clearRect(0, 0, W, H);

      const skyGradient = ctx.createLinearGradient(0, 0, 0, H - GROUND_HEIGHT);
      skyGradient.addColorStop(0, level.sky[0]);
      skyGradient.addColorStop(1, level.sky[1]);
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, W, H - GROUND_HEIGHT);

      if (customLayers?.sky && customLayers.sky.loaded) {
        drawImageCover(customLayers.sky, 0, 0, W, H);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        drawCloudShape(80, 90, 22);
        drawCloudShape(180, 60, 18);
        drawCloudShape(340, 110, 26);
      }

      const groundGradient = ctx.createLinearGradient(0, H - GROUND_HEIGHT, 0, H);
      groundGradient.addColorStop(0, level.ground[0]);
      groundGradient.addColorStop(1, level.ground[1]);
      ctx.fillStyle = groundGradient;
      ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);

      drawParallaxGround();
    }

    function drawCampaignParallaxAsset(asset, offset, widthFactor, bottomY, alpha = 1) {
      if (!asset || !asset.loaded) return false;

      const drawW = W * widthFactor;
      const scale = drawW / asset.img.width;
      const drawH = asset.img.height * scale;
      const tileSpan = Math.max(1, drawW);
      const scroll = ((-offset % tileSpan) + tileSpan) % tileSpan;
      const baseX = (W - drawW) / 2;

      ctx.save();
      ctx.globalAlpha = alpha;
      for (let x = baseX - scroll - drawW; x < W + drawW; x += drawW) {
        ctx.drawImage(asset.img, x, bottomY - drawH, drawW, drawH);
      }
      ctx.restore();
      return true;
    }

    function drawBlendedCampaignParallaxAssets(assets, offset, widthFactor, bottomY, alpha = 1) {
      const readyAssets = (assets || []).filter(asset => asset && asset.loaded);
      if (readyAssets.length === 0) return false;
      if (readyAssets.length === 1) {
        return drawCampaignParallaxAsset(readyAssets[0], offset, widthFactor, bottomY, alpha);
      }

      const drawW = W * widthFactor;
      const scale = drawW / readyAssets[0].img.width;
      const drawH = readyAssets[0].img.height * scale;
      const tileSpan = Math.max(1, drawW);
      const scroll = ((-offset % tileSpan) + tileSpan) % tileSpan;
      const baseX = (W - drawW) / 2;

      ctx.save();
      ctx.globalAlpha = alpha;
      for (let x = baseX - scroll - drawW, tileIndex = -1; x < W + drawW; x += drawW, tileIndex++) {
        const seqIndex = ((tileIndex % readyAssets.length) + readyAssets.length) % readyAssets.length;
        const currentAsset = readyAssets[seqIndex];
        ctx.drawImage(currentAsset.img, x, bottomY - drawH, drawW, drawH);
      }
      ctx.restore();
      return true;
    }

    function drawCustomCampaignLayers(customLayers, groundTop) {
      if (!customLayers) return false;

      const drewFar = drawBlendedCampaignParallaxAssets(
        customLayers.farVariants || [customLayers.far],
        parallax.far * 0.2,
        1.9,
        groundTop + 24,
        0.9
      );
      const drewMid = drawCampaignParallaxAsset(customLayers.mid, parallax.mid * 0.32, 2.05, groundTop + 58, 0.95);
      const drewFore = drawCampaignParallaxAsset(customLayers.fore, parallax.fore * 0.5, 2.2, H + 210, 1);

      return drewFar || drewMid || drewFore;
    }

    // === New multi-level parallax ground ===
    function drawParallaxGround() {
      const level = LEVELS[currentLevelIndex];
      const p = level.parallax || {};
      const farColor = p.farColor || "#3e5136";
      const midColor = p.midColor || "#7e653e";
      const foreColor = p.foreColor || "#4a3b26";
      const theme = p.theme || "rural";

      const groundTop = H - GROUND_HEIGHT;

      if (drawCustomCampaignLayers(p.customLayers, groundTop)) {
        return;
      }

      // little variation per level so Y offsets change
      const baseOffset = currentLevelIndex * 3;
      const farY = groundTop + 16 + baseOffset;
      const midY = groundTop + 30 + baseOffset;
      const foreY = groundTop + 40 + baseOffset;

      // ---- FAR LAYER: distant hills / silhouettes ----
      const farSegW = 140;
      let fx = parallax.far % farSegW;
      if (fx > 0) fx -= farSegW;

      ctx.fillStyle = farColor;
      for (let x = fx; x < W + farSegW; x += farSegW) {
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x, farY + 18);

        if (theme === "battlefield") {
          ctx.quadraticCurveTo(
            x + farSegW * 0.25, farY + 4,
            x + farSegW * 0.5, farY + 14
          );
          ctx.quadraticCurveTo(
            x + farSegW * 0.75, farY + 28,
            x + farSegW, farY + 16
          );
        } else {
          ctx.quadraticCurveTo(
            x + farSegW * 0.25, farY - 6,
            x + farSegW * 0.5, farY + 10
          );
          ctx.quadraticCurveTo(
            x + farSegW * 0.75, farY + 24,
            x + farSegW, farY + 12
          );
        }

        ctx.lineTo(x + farSegW, H);
        ctx.closePath();
        ctx.fill();

        // Forest silhouettes: rural / farmland
        if (theme === "rural" || theme === "farmland") {
          const treeBaseY = farY + 8;
          ctx.fillStyle = "rgba(20,40,20,0.8)";
          for (let i = 0; i < 3; i++) {
            const tx = x + 15 + i * 30;
            ctx.beginPath();
            ctx.moveTo(tx, treeBaseY - 14);
            ctx.lineTo(tx - 6, treeBaseY + 4);
            ctx.lineTo(tx + 6, treeBaseY + 4);
            ctx.closePath();
            ctx.fill();
          }
          ctx.fillStyle = farColor;
        }

        // Factory chimneys in industrial level
        if (theme === "industrial") {
          ctx.fillStyle = "rgba(30,30,35,0.9)";
          const bX = x + farSegW * 0.4;
          const bY = farY + 5;
          ctx.fillRect(bX, bY - 16, 10, 16);
          ctx.fillRect(bX + 16, bY - 22, 8, 22);

          ctx.fillStyle = "rgba(80,80,80,0.6)";
          ctx.beginPath();
          ctx.arc(bX + 18, bY - 26, 5, 0, Math.PI * 2);
          ctx.arc(bX + 22, bY - 32, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = farColor;
        }
      }

      // ---- MID LAYER: fences / fields / trenches / low buildings ----
      const midSegW = 110;
      let mx = parallax.mid % midSegW;
      if (mx > 0) mx -= midSegW;

      for (let x = mx; x < W + midSegW; x += midSegW) {
        if (theme === "industrial") {
          // Low town strip
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY - 6, midSegW * 0.9, 14);
          ctx.fillStyle = "rgba(30,30,30,0.9)";
          for (let w = 0; w < 4; w++) {
            ctx.fillRect(x + 6 + w * 20, midY - 2, 8, 4);
          }
        } else if (theme === "battlefield") {
          // Trenches
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY + 4, midSegW * 0.7, 10);

          ctx.strokeStyle = "rgba(20,10,5,0.9)";
          ctx.lineWidth = 1.3;
          ctx.beginPath();
          ctx.moveTo(x, midY + 2);
          ctx.lineTo(x + midSegW * 0.7, midY + 2);
          ctx.stroke();

          ctx.strokeStyle = "rgba(40,30,20,0.9)";
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const px = x + 8 + i * 16;
            ctx.moveTo(px, midY + 2);
            ctx.lineTo(px - 3, midY - 10);
          }
          ctx.stroke();
        } else {
          // Original fence strip for rural/farmland
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY + 4, midSegW * 0.7, 8);

          ctx.fillStyle = "#5b4a30";
          ctx.beginPath();
          ctx.ellipse(x + midSegW * 0.35, midY + 10, 10, 4, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(40,30,20,0.9)";
          ctx.lineWidth = 1.3;
          ctx.beginPath();
          ctx.moveTo(x + 6, midY);
          ctx.lineTo(x + 6, midY - 8);
          ctx.moveTo(x + 26, midY);
          ctx.lineTo(x + 26, midY - 7);
          ctx.stroke();

          ctx.strokeStyle = "rgba(80,60,40,0.8)";
          ctx.lineWidth = 0.9;
          ctx.beginPath();
          ctx.moveTo(x + 6, midY - 7);
          ctx.lineTo(x + 26, midY - 6);
          ctx.stroke();

          // Hay bales on farmland
          if (theme === "farmland") {
            ctx.fillStyle = "rgba(235, 203, 139, 0.85)";
            ctx.beginPath();
            ctx.ellipse(x + 50, midY + 6, 7, 4, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // ---- FOREGROUND LAYER: bunkers / craters / buildings ----
      const foreSegW = 130;
      let bx = parallax.fore % foreSegW;
      if (bx > 0) bx -= foreSegW;

      for (let x = bx; x < W + foreSegW; x += foreSegW) {
        ctx.fillStyle = foreColor;

        ctx.beginPath();
        ctx.moveTo(x, foreY + 10);
        ctx.lineTo(x + 18, foreY + 4);
        ctx.lineTo(x + 40, foreY + 12);
        ctx.lineTo(x + 68, foreY + 6);
        ctx.lineTo(x + 92, foreY + 14);
        ctx.lineTo(x + foreSegW, foreY + 8);
        ctx.lineTo(x + foreSegW, H);
        ctx.lineTo(x, H);
        ctx.closePath();
        ctx.fill();

        if (theme === "industrial") {
          // Buildings close to camera
          ctx.fillStyle = "rgba(35,35,40,0.95)";
          const b1x = x + 18;
          const b1y = foreY - 4;
          ctx.fillRect(b1x, b1y - 22, 26, 22);
          ctx.fillRect(b1x + 32, b1y - 16, 20, 16);

          ctx.fillStyle = "rgba(250,250,210,0.6)";
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(b1x + 4 + i * 7, b1y - 16, 4, 4);
          }
        } else if (theme === "battlefield") {
          // Craters + barbed wire
          ctx.fillStyle = "rgba(30,20,15,0.9)";
          ctx.beginPath();
          ctx.ellipse(x + 30, foreY + 12, 10, 4, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 70, foreY + 16, 12, 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(15,10,8,0.9)";
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.moveTo(x + 6, foreY + 2);
          ctx.lineTo(x + foreSegW - 10, foreY - 2);
          ctx.stroke();

          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const px = x + 10 + i * 18;
            ctx.moveTo(px, foreY);
            ctx.lineTo(px + 4, foreY - 8);
          }
          ctx.stroke();
        } else {
          // Original bunker & smoke for rural/farmland
          ctx.fillStyle = "#34312c";
          const bunkX = x + 24;
          const bunkY = foreY - 6;
          ctx.fillRect(bunkX, bunkY, 32, 16);

          ctx.fillStyle = "#1b1a18";
          ctx.fillRect(bunkX + 8, bunkY + 7, 18, 7);

          const smokeBaseX = bunkX + 26;
          const smokeBaseY = bunkY - 4;
          ctx.fillStyle = "rgba(90,90,90,0.6)";
          ctx.beginPath();
          ctx.arc(smokeBaseX, smokeBaseY, 6, 0, Math.PI * 2);
          ctx.arc(smokeBaseX + 6, smokeBaseY - 6, 5, 0, Math.PI * 2);
          ctx.arc(smokeBaseX - 4, smokeBaseY - 10, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawCloudShape(cx, cy, r) {
      ctx.beginPath();
      ctx.arc(cx - r, cy, r, Math.PI * 0.5, Math.PI * 1.5);
      ctx.arc(cx, cy - r, r, Math.PI, 0);
      ctx.arc(cx + r, cy, r, Math.PI * 1.5, Math.PI * 0.5);
      ctx.closePath();
      ctx.fill();
    }

    function drawStar6(cx, cy, outerR, innerR, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;

      ctx.beginPath();
      const spikes = 6;
      const step = Math.PI / spikes;
      let rot = -Math.PI / 2;

      for (let i = 0; i < spikes * 2; i++) {
        const r = (i % 2 === 0) ? outerR : innerR;
        const x = cx + Math.cos(rot) * r;
        const y = cy + Math.sin(rot) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        rot += step;
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawFlakCloud(cx, cy, baseR, age = 0) {
      const ageNorm = Math.min(1, age / 260);
      const smokeR = baseR * (0.9 + ageNorm * 0.25);
      const flash = Math.max(0, 1 - ageNorm * 2.4);
      const shardAlpha = Math.max(0, 0.9 - ageNorm * 1.1);

      ctx.save();

      if (flash > 0) {
        const flashR = smokeR * (0.32 + flash * 0.18);
        const flashGrad = ctx.createRadialGradient(
          cx, cy, flashR * 0.08,
          cx, cy, flashR
        );
        flashGrad.addColorStop(0, `rgba(255,252,236,${0.96 * flash})`);
        flashGrad.addColorStop(0.38, `rgba(255,202,96,${0.82 * flash})`);
        flashGrad.addColorStop(0.74, `rgba(255,122,36,${0.46 * flash})`);
        flashGrad.addColorStop(1, "rgba(80,24,12,0)");
        ctx.fillStyle = flashGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, flashR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 0.92;
      ctx.fillStyle = "rgba(48,46,45,0.92)";
      ctx.strokeStyle = "rgba(24,22,20,0.62)";
      ctx.lineWidth = Math.max(1.2, smokeR * 0.07);

      ctx.beginPath();
      ctx.arc(cx - smokeR * 0.34, cy + smokeR * 0.06, smokeR * 0.4, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.32, cy, smokeR * 0.34, 0, Math.PI * 2);
      ctx.arc(cx - smokeR * 0.02, cy - smokeR * 0.28, smokeR * 0.46, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.06, cy + smokeR * 0.24, smokeR * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(118,112,104,0.2)";
      ctx.beginPath();
      ctx.arc(cx - smokeR * 0.08, cy - smokeR * 0.14, smokeR * 0.18, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.1, cy - smokeR * 0.08, smokeR * 0.12, 0, Math.PI * 2);
      ctx.fill();

      if (shardAlpha > 0) {
        const shardLen = smokeR * (0.46 + flash * 0.18);
        ctx.strokeStyle = `rgba(255,224,176,${0.42 * shardAlpha})`;
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = -Math.PI / 2 + i * (Math.PI * 0.4);
          const sx = cx + Math.cos(angle) * smokeR * 0.22;
          const sy = cy + Math.sin(angle) * smokeR * 0.22;
          const ex = cx + Math.cos(angle) * shardLen;
          const ey = cy + Math.sin(angle) * shardLen;
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawObstacle(o) {
      if (o.type === "cloud") {
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        drawCloudShape(o.x, o.y, o.r);
      } else if (o.type === "balloon") {
        if (balloonLoaded) {
          const scale = 0.45;
          const imgW = balloonImg.width * scale;
          const imgH = balloonImg.height * scale;
          ctx.drawImage(
            balloonImg,
            o.x - imgW / 2,
            o.y - imgH / 2,
            imgW,
            imgH
          );
        } else {
          ctx.fillStyle = "#e0c68b";
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (o.type === "zeppelin") {
        if (zeppelinLoaded) {
          const scale = 0.45;
          const imgW = zeppelinImg.width * scale;
          const imgH = zeppelinImg.height * scale;
          ctx.drawImage(
            zeppelinImg,
            o.x - imgW / 2,
            o.y - imgH / 2,
            imgW,
            imgH
          );
        } else {
          ctx.fillStyle = "#c6b38c";
          ctx.beginPath();
          ctx.ellipse(o.x, o.y, o.r * 1.7, o.r, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (o.type === "flak") {
        const burstFactor = Math.min(1, (o.age || 0) / 140);
        const baseR = o.r * burstFactor;
        drawFlakCloud(o.x, o.y, baseR, o.age || 0);
      }
    }

    function drawEnemy(enemy) {
      if (enemy.type === "zeppelin") {
        if (zeppelinLoaded) {
          const scale = 0.38;
          const imgW = zeppelinImg.width * scale;
          const imgH = zeppelinImg.height * scale;
          ctx.drawImage(zeppelinImg, enemy.x - imgW / 2, enemy.y - imgH / 2, imgW, imgH);
          return;
        }

        ctx.fillStyle = "#788d95";
        ctx.beginPath();
        ctx.ellipse(enemy.x, enemy.y, enemy.width * 0.52, enemy.height * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      const enemyPlaneType = getEnemyPlaneType(enemy.type);
      const sprite = getPlaneSprite(enemyPlaneType);

      if (!sprite.loaded) {
        ctx.save();
        ctx.fillStyle = "rgba(35, 35, 38, 0.7)";
        ctx.beginPath();
        ctx.ellipse(enemy.x, enemy.y, enemy.width * 0.42, enemy.height * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }

      const scale = sprite.scale * (enemy.type.includes("bomber") ? 0.88 : 0.8);
      const imgW = sprite.img.width * scale;
      const imgH = sprite.img.height * scale;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#1b2432";
      ctx.beginPath();
      ctx.ellipse(0, 0, imgW * 0.34, imgH * 0.24, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = "rgba(255, 244, 218, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, imgW * 0.3, imgH * 0.2, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.scale(-1, 1);
      ctx.filter = "brightness(0.74) saturate(0.86) contrast(1.08)";
      ctx.globalAlpha = 0.96;
      ctx.drawImage(sprite.img, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.filter = "none";
      ctx.restore();
    }

    function drawPlayerShot(shot) {
      ctx.save();
      const glow = ctx.createRadialGradient(shot.x, shot.y, 0, shot.x, shot.y, shot.r * 2.3);
      glow.addColorStop(0, "rgba(255, 250, 220, 0.98)");
      glow.addColorStop(0.38, "rgba(255, 196, 84, 0.7)");
      glow.addColorStop(1, "rgba(255, 140, 0, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(shot.x, shot.y, shot.r * 2.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 170, 40, 0.95)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(shot.x - 9, shot.y);
      ctx.lineTo(shot.x + 1, shot.y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 244, 194, 0.95)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(shot.x - 6, shot.y);
      ctx.lineTo(shot.x + 2, shot.y);
      ctx.stroke();

      ctx.fillStyle = "#fffaf0";
      ctx.beginPath();
      ctx.arc(shot.x, shot.y, shot.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffb300";
      ctx.beginPath();
      ctx.arc(shot.x - 1, shot.y, shot.r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSmokePuff(cx, cy, baseR, alpha, shade) {
      ctx.save();
      ctx.globalAlpha = alpha;
      const phase = performance.now() * 0.004;
      const driftX = Math.sin(phase + cx * 0.01) * baseR * 0.08;
      const driftY = Math.cos(phase * 0.8 + cy * 0.01) * baseR * 0.05;
      const puffX = cx + driftX;
      const puffY = cy + driftY;
      const outlineAlpha = Math.min(1, alpha * 1.15);

      ctx.fillStyle = shade;
      ctx.strokeStyle = `rgba(40, 34, 30, ${outlineAlpha})`;
      ctx.lineWidth = Math.max(1.25, baseR * 0.12);
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.arc(puffX - baseR * 0.46, puffY + baseR * 0.08, baseR * 0.56, Math.PI * 0.35, Math.PI * 1.78);
      ctx.arc(puffX - baseR * 0.04, puffY - baseR * 0.28, baseR * 0.72, Math.PI * 0.9, Math.PI * 2.12);
      ctx.arc(puffX + baseR * 0.42, puffY - baseR * 0.02, baseR * 0.5, Math.PI * 1.18, Math.PI * 0.28);
      ctx.arc(puffX + baseR * 0.1, puffY + baseR * 0.34, baseR * 0.64, Math.PI * 1.88, Math.PI * 0.88, true);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(236, 231, 223, 0.18)";
      ctx.beginPath();
      ctx.ellipse(
        puffX - baseR * 0.12,
        puffY - baseR * 0.22,
        baseR * 0.46,
        baseR * 0.24,
        -0.25,
        0,
        Math.PI * 2
      );
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 250, 244, ${Math.min(0.26, alpha * 0.34)})`;
      ctx.lineWidth = Math.max(0.8, baseR * 0.05);
      ctx.beginPath();
      ctx.arc(puffX - baseR * 0.18, puffY - baseR * 0.18, baseR * 0.26, Math.PI * 1.1, Math.PI * 1.85);
      ctx.stroke();

      ctx.restore();
    }

    function drawPlane() {
      const { x, y, width, height } = plane;
      const cx = x + width * 0.5;
      const cy = y + height * 0.5;

      const sprite = getPlaneSprite(planeType);
      const img = sprite.img;
      const loaded = sprite.loaded;
      const scale = sprite.scale;

      if (!loaded) {
        ctx.fillStyle = "red";
        fillRoundedRect(x, y, width, height, 4);
        return;
      }

      const imgWidth = img.width * scale;
      const imgHeight = img.height * scale;

      ctx.drawImage(
        img,
        cx - imgWidth / 2,
        cy - imgHeight / 2,
        imgWidth,
        imgHeight
      );

      const noseX = cx + imgWidth * 0.35;
      const noseY = cy;

      if (damageLevel >= 1 && damageLevel < 3) {
        const R = imgWidth * 0.09;

        drawSmokePuff(
          noseX - 4,
          noseY - 6,
          R,
          0.8,
          "rgb(90,90,90)"
        );

        drawSmokePuff(
          noseX - 14,
          noseY - 10,
          R * 1.5,
          0.6,
          "rgb(120,120,120)"
        );

        drawSmokePuff(
          noseX - 28,
          noseY - 14,
          R * 2.0,
          0.4,
          "rgb(150,150,150)"
        );
      }

      if (damageLevel >= 2 && damageLevel < 3) {
        ctx.beginPath();
        ctx.moveTo(noseX + 2, noseY - 4);
        ctx.quadraticCurveTo(noseX + 14, noseY - 22, noseX + 4, noseY - 10);
        ctx.quadraticCurveTo(noseX - 2, noseY - 16, noseX + 2, noseY - 4);
        ctx.fillStyle = "rgba(255,160,0,0.9)";
        ctx.fill();
      }

      if (damageLevel >= 3) {
        ctx.save();
        ctx.globalAlpha = 0.9;
        const explodeR = imgWidth * 0.6;
        const grad = ctx.createRadialGradient(
          cx, cy, explodeR * 0.2,
          cx, cy, explodeR
        );
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.3, "rgba(255,200,0,1)");
        grad.addColorStop(0.7, "rgba(255,80,0,0.9)");
        grad.addColorStop(1, "rgba(80,20,0,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, explodeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFogOverlay() {
      if (score < 100) return;

      const extra = Math.min((score - 100) * 0.003, 0.25);
      const alphaBottom = 0.30 + extra;
      const alphaTop = alphaBottom * 0.8;

      ctx.save();
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, `rgba(255,255,255, ${alphaTop.toFixed(3)})`);
      grad.addColorStop(1, `rgba(255,255,255, ${alphaBottom.toFixed(3)})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    function drawScene() {
      drawBackground();

      for (const o of obstacles) {
        drawObstacle(o);
      }
      for (const enemy of enemies) {
        drawEnemy(enemy);
      }
      for (const shot of playerShots) {
        drawPlayerShot(shot);
      }
      drawPlane();

      drawFogOverlay();

      if (!gameOver && activeCampaignIntro && performance.now() < campaignIntroUntil) {
        const now = performance.now();
        const timeLeft = campaignIntroUntil - now;
        const introAlpha = Math.min(1, Math.max(0, Math.min((4200 - timeLeft) / 450, timeLeft / 900)));

        ctx.save();
        ctx.globalAlpha = introAlpha;
        ctx.fillStyle = "rgba(20, 18, 15, 0.42)";
        fillRoundedRect(56, 92, W - 112, 78, 16);

        ctx.textAlign = "center";
        ctx.fillStyle = "#ffe7ad";
        ctx.font = "700 22px " + UI_FONT;
        ctx.fillText(activeCampaignIntro.title, W / 2, 122);

        ctx.fillStyle = "#fff4d8";
        ctx.font = "16px " + UI_FONT;
        ctx.fillText(activeCampaignIntro.subtitle, W / 2, 148);
        ctx.restore();
      }

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, H / 2 - 70, W, 140);

        ctx.textAlign = "center";

        ctx.font = "30px " + UI_FONT;
        ctx.fillStyle = "#ffeb3b";
        ctx.fillText("Game Over", W / 2, H / 2 - 20);

        ctx.font = "17px " + UI_FONT;
        ctx.fillStyle = "#ffe082";
        ctx.fillText(`Score: ${score}  •  Best: ${bestScore}`, W / 2, H / 2 + 6);
        ctx.fillText("Tap or press SPACE to return to menu", W / 2, H / 2 + 34);
      }
    }

    function drawImageCover(asset, x, y, w, h) {
      if (!asset || !asset.loaded) return false;

      const iw = asset.img.width;
      const ih = asset.img.height;
      const scale = Math.max(w / iw, h / ih);
      const drawW = iw * scale;
      const drawH = ih * scale;
      const dx = x + (w - drawW) / 2;
      const dy = y + (h - drawH) / 2;
      ctx.drawImage(asset.img, dx, dy, drawW, drawH);
      return true;
    }

    function drawSplashBadge(asset, cx, cy, size, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;

      if (asset && asset.loaded) {
        const scale = Math.min(size / asset.img.width, size / asset.img.height);
        const imgW = asset.img.width * scale;
        const imgH = asset.img.height * scale;
        ctx.drawImage(asset.img, cx - imgW / 2, cy - imgH / 2, imgW, imgH);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.33, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawSplashBadgeHalo(cx, cy, radius) {
      const halo = ctx.createRadialGradient(cx, cy, radius * 0.18, cx, cy, radius);
      halo.addColorStop(0, "rgba(255, 250, 244, 0.92)");
      halo.addColorStop(0.55, "rgba(255, 248, 236, 0.5)");
      halo.addColorStop(1, "rgba(255, 248, 236, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---------- SPLASH SCREEN ----------
    function drawSplash() {
      if (screen !== "splash") return;
      updateOverlayVisibility();

      ctx.clearRect(0, 0, W, H);
      if (!drawImageCover(menuBackground, 0, 0, W, H)) {
        ctx.fillStyle = "#fdfaf3";
        ctx.fillRect(0, 0, W, H);
      }

      const topShade = ctx.createLinearGradient(0, 0, 0, H);
      topShade.addColorStop(0, "rgba(12, 19, 32, 0.42)");
      topShade.addColorStop(0.25, "rgba(12, 19, 32, 0.08)");
      topShade.addColorStop(0.72, "rgba(255, 245, 230, 0)");
      topShade.addColorStop(1, "rgba(20, 18, 16, 0.28)");
      ctx.fillStyle = topShade;
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = "center";

      // Title
      ctx.font = "28px " + UI_FONT;
      ctx.fillStyle = "#fff7dc";
      ctx.strokeStyle = "rgba(36, 24, 12, 0.75)";
      ctx.lineWidth = 4;
      ctx.strokeText(GAME_TITLE, W / 2, H * 0.11);
      ctx.fillText(GAME_TITLE, W / 2, H * 0.11);

      ctx.font = "18px " + UI_FONT;
      ctx.fillStyle = "#f5e6b7";
      ctx.strokeStyle = "rgba(49, 35, 18, 0.78)";
      ctx.lineWidth = 3.2;
      ctx.strokeText("Choose your side", W / 2, H * 0.34 + 6);
      ctx.fillText("Choose your side", W / 2, H * 0.34 + 6);

      const iconSize = 72;
      const iconY = H * 0.61;
      const britishX = W * 0.27;
      const germanX = W * 0.73;
      const badgeHitSize = 110;

      britishEntryRect = {
        x: britishX - badgeHitSize / 2,
        y: iconY - badgeHitSize / 2 - 10,
        w: badgeHitSize,
        h: badgeHitSize
      };
      germanEntryRect = {
        x: germanX - badgeHitSize / 2,
        y: iconY - badgeHitSize / 2 - 10,
        w: badgeHitSize,
        h: badgeHitSize
      };

      drawSplashBadgeHalo(britishX, iconY - 10, 48);
      drawSplashBadgeHalo(germanX, iconY - 10, 48);
      drawSplashBadge(britishRoundel, britishX, iconY - 12, iconSize);
      drawSplashBadge(germanCross, germanX, iconY - 12, iconSize);

      const labelY = iconY + 46;
      const labelW = 156;
      const labelH = 26;

      ctx.fillStyle = "rgba(28, 22, 16, 0.44)";
      fillRoundedRect(britishX - labelW / 2, labelY - 18, labelW, labelH, 11);
      fillRoundedRect(germanX - labelW / 2, labelY - 18, labelW, labelH, 11);

      ctx.fillStyle = "#fff4d1";
      ctx.font = "14px " + UI_FONT;
      ctx.strokeStyle = "rgba(22, 14, 9, 0.72)";
      ctx.lineWidth = 2.4;
      ctx.strokeText("Royal Flying Corps", britishX, labelY);
      ctx.strokeText("German Air Service", germanX, labelY);
      ctx.fillText("Royal Flying Corps", britishX, labelY);
      ctx.fillText("German Air Service", germanX, labelY);

      const stripY = H * 0.81;
      const stripH = 86;
      const stripX = 58;
      const stripW = W - 116;
      ctx.fillStyle = "rgba(28, 36, 46, 0.34)";
      fillRoundedRect(stripX, stripY, stripW, stripH, 22);

      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255, 247, 226, 0.95)";
      ctx.font = "15px " + UI_FONT;
      ctx.fillText("Top Ace", stripX + 20, stripY + 28);

      const aceLine = leaderboard.length > 0
        ? `${leaderboard[0].name} - ${leaderboard[0].score}`
        : "No aces recorded yet";
      ctx.font = "13px " + UI_FONT;
      ctx.fillStyle = "rgba(255, 247, 226, 0.88)";
      ctx.fillText(aceLine, stripX + 20, stripY + 50);

      ctx.textAlign = "center";
      const futureY = stripY + 20;
      const futureIcons = [
        americanRoundel,
        frenchRoundel,
        italianRoundel,
        russianRoundel
      ];
      ctx.fillStyle = "rgba(255, 247, 226, 0.8)";
      ctx.font = "13px " + UI_FONT;
      ctx.fillText("More nations ahead", stripX + stripW * 0.69, stripY + 22);

      futureIcons.forEach((asset, i) => {
        const cx = stripX + stripW * 0.54 + i * 44;
        drawSplashBadge(asset, cx, futureY + 28, 32, 0.95);
      });

      ctx.textAlign = "center";

      hintEl.textContent = "Tap a side to enter";
    }

    // ---------- GERMAN PLANE SELECT (uses DR3 thumbnail) ----------
    function drawGermanPlaneList() {
      if (screen !== "planeSelectGerman") return;
      updateOverlayVisibility();

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#fdfaf3";
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = "center";
      ctx.fillStyle = "#0d47a1";
      ctx.font = "22px " + UI_FONT;
      ctx.fillText("German Air Service", W / 2, H * 0.12);

      ctx.fillStyle = "#4e342e";
      ctx.font = "16px " + UI_FONT;
      ctx.fillText("Select your aircraft", W / 2, H * 0.18);

      hintEl.textContent = "Tap a tier to choose your aircraft";

      germanPlaneChoices = [];

      const startY = H * 0.26;
      const rowH = 82;
      const rowX = 40;
      const rowW = W - 80;

      const entries = GERMAN_STANDARD_PLANES.map(entry => ({
        ...entry,
        unlocked: true
      }));

      entries.forEach((entry, i) => {
        const y = startY + i * rowH;

        ctx.save();
        ctx.fillStyle = entry.unlocked ? "rgba(255,255,255,0.97)" : "rgba(230,230,230,0.95)";
        fillRoundedRect(rowX, y, rowW, rowH - 14, 12);

        ctx.strokeStyle = entry.unlocked ? "rgba(33,33,33,0.3)" : "rgba(100,100,100,0.3)";
        ctx.lineWidth = 1;
        ctx.strokeRect(rowX + 0.5, y + 0.5, rowW - 1, rowH - 15);

        const thumbX = rowX + 20;
        const thumbY = y + (rowH - 14) / 2;

        let imgToUse = null;
        if (entry.planeType === "e3std") {
          if (e3StdLoaded)         imgToUse = e3StdImg;
        } else if (entry.planeType === "dr1std") {
          if (dr1StdLoaded)        imgToUse = dr1StdImg;
        } else if (entry.planeType === "d7std") {
          if (d7StdLoaded)         imgToUse = d7StdImg;
        } else if (entry.planeType === "d7rb") {
          if (d7RbLoaded)          imgToUse = d7RbImg;
        } else if (entry.planeType === "d7vik") {
          if (d7VikLoaded)         imgToUse = d7VikImg;
        }

        if (imgToUse) {
          const maxW = 128;
          const maxH = 52;
          const scale = Math.min(maxW / imgToUse.width, maxH / imgToUse.height);
          const imgW = imgToUse.width * scale;
          const imgH = imgToUse.height * scale;
          ctx.drawImage(imgToUse, thumbX - imgW / 2, thumbY - imgH / 2, imgW, imgH);
        } else {
          ctx.fillStyle = "#b0bec5";
          ctx.fillRect(thumbX - 30, thumbY - 15, 60, 30);
        }

        ctx.textAlign = "left";
        ctx.fillStyle = "#263238";
        ctx.font = "14px " + UI_FONT;
        ctx.fillText(`${entry.tier} – ${entry.label}`, rowX + 80, y + 28);

        ctx.font = "13px " + UI_FONT;
        ctx.fillStyle = entry.unlocked ? "#2e7d32" : "#b0bec5";
        ctx.fillText(entry.unlocked ? "Ready" : "Locked", rowX + 80, y + 48);

        ctx.restore();

        germanPlaneChoices.push({
          x: rowX,
          y,
          w: rowW,
          h: rowH - 14,
          planeType: entry.planeType,
          unlocked: entry.unlocked,
          tier: entry.tier
        });
      });

      ctx.textAlign = "center";
      ctx.fillStyle = "#5d4037";
      ctx.font = "13px " + UI_FONT;
      ctx.fillText("Ace liveries unlock through events or supporter purchases", W / 2, H - 52);
      ctx.fillText("Tap anywhere outside rows to go back", W / 2, H - 30);
    }

    function drawBritishWIP() {
      if (screen !== "planeSelectBritish") return;
      updateOverlayVisibility();

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#fdfaf3";
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = "center";

      ctx.fillStyle = "#0d47a1";
      ctx.font = "22px " + UI_FONT;
      ctx.fillText("Royal Flying Corps", W / 2, H * 0.16);

      ctx.fillStyle = "#4e342e";
      ctx.font = "16px " + UI_FONT;
      ctx.fillText("Select your aircraft", W / 2, H * 0.22);

      hintEl.textContent = "Tap a tier to choose your aircraft";

      britishPlaneChoices = [];

      const startY = H * 0.30;
      const rowH = 100;
      const rowX = 40;
      const rowW = W - 80;

      const entries = [
        { tier: "Tier 1", label: "Airco DH.1", planeType: "dh1", loaded: dh1Loaded, img: dh1Img },
        { tier: "Tier 2", label: "Airco DH.2", planeType: "dh2", loaded: dh2Loaded, img: dh2Img },
        { tier: "Tier 3", label: "Sopwith Pup", planeType: "pupstd", loaded: pupStdLoaded, img: pupStdImg }
      ];

      entries.forEach((entry, i) => {
        const y = startY + i * rowH;

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.97)";
        fillRoundedRect(rowX, y, rowW, rowH - 14, 12);

        ctx.strokeStyle = "rgba(33,33,33,0.3)";
        ctx.lineWidth = 1;
        ctx.strokeRect(rowX + 0.5, y + 0.5, rowW - 1, rowH - 15);

        const thumbX = rowX + 88;
        const thumbY = y + (rowH - 14) / 2;

        if (entry.loaded) {
          const maxW = 150;
          const maxH = 56;
          const scale = Math.min(maxW / entry.img.width, maxH / entry.img.height);
          const imgW = entry.img.width * scale;
          const imgH = entry.img.height * scale;
          ctx.drawImage(entry.img, thumbX - imgW / 2, thumbY - imgH / 2, imgW, imgH);
        } else {
          ctx.fillStyle = "#b0bec5";
          ctx.fillRect(thumbX - 50, thumbY - 20, 100, 40);
        }

        ctx.textAlign = "left";
        ctx.fillStyle = "#263238";
        ctx.font = "14px " + UI_FONT;
        ctx.fillText(`${entry.tier} - ${entry.label}`, rowX + 180, y + 34);

        ctx.font = "13px " + UI_FONT;
        ctx.fillStyle = "#2e7d32";
        ctx.fillText("Ready", rowX + 180, y + 56);

        ctx.restore();

        britishPlaneChoices.push({
          x: rowX,
          y,
          w: rowW,
          h: rowH - 14,
          planeType: entry.planeType
        });
      });

      ctx.textAlign = "center";
      ctx.fillStyle = "#5d4037";
      ctx.font = "13px " + UI_FONT;
      ctx.fillText("Tap anywhere outside rows to go back", W / 2, H - 30);
    }

    function endGame() {
      if (!gameOver) {
        gameOver = true;
        gameRunning = false;
        // submit score once per run
        if (!scoreSubmitted && score > 0) {
          scoreSubmitted = true;
          updateLeaderboardForCurrentPilot();
        }
      }
      updateOverlayVisibility();
      drawScene();
    }

    function loop(timestamp) {
      if (!gameRunning) return;

      if (!lastTime) {
        lastTime = timestamp;
        lastSpawnTime = timestamp;
      }
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      update(dt, timestamp);
      drawScene();

      if (gameRunning) requestAnimationFrame(loop);
    }

    function getCanvasCoordinates(evt) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;

      if (evt.touches && evt.touches.length > 0) {
        clientX = evt.touches[0].clientX;
        clientY = evt.touches[0].clientY;
      } else if (evt.changedTouches && evt.changedTouches.length > 0) {
        clientX = evt.changedTouches[0].clientX;
        clientY = evt.changedTouches[0].clientY;
      } else {
        clientX = evt.clientX;
        clientY = evt.clientY;
      }

      const x = ((clientX - rect.left) / rect.width) * W;
      const y = ((clientY - rect.top) / rect.height) * H;
      return { x, y };
    }

    function handleInput(evt) {
      // start music on first interaction
      startBgmIfNeeded();

      if (screen === "splash") {
        if (evt) {
          const { x, y } = getCanvasCoordinates(evt);

          function inside(r) {
            return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
          }

          if (inside(germanEntryRect)) {
            screen = "planeSelectGerman";
            drawGermanPlaneList();
            return;
          }
          if (inside(britishEntryRect)) {
            screen = "planeSelectBritish";
            drawBritishWIP();
            return;
          }
          return;
        } else {
          ensurePilotName();
          planeType = "e3std";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = "Tap or press SPACE to fly - guns fire automatically";
          resetGame();
          flap();
          startGameLoop();
          return;
        }
      }

      if (screen === "planeSelectGerman") {
        if (!evt) {
          ensurePilotName();
          planeType = "e3std";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = "Tap or press SPACE to fly - guns fire automatically";
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        let clickedRow = null;
        for (const row of germanPlaneChoices) {
          if (x >= row.x && x <= row.x + row.w && y >= row.y && y <= row.y + row.h) {
            clickedRow = row;
            break;
          }
        }

        if (clickedRow) {
          if (!clickedRow.unlocked) {
            hintEl.textContent = "Tier 2 locked.\nReach Stage 4 with 40+ points to unlock.";
            return;
          }
          ensurePilotName();
          planeType = clickedRow.planeType;
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = "Tap or press SPACE to fly - guns fire automatically";
          resetGame();
          flap();
          startGameLoop();
          return;
        } else {
          screen = "splash";
          hintEl.textContent = "Tap a side to enter";
          drawSplash();
          return;
        }
      }

      if (screen === "planeSelectBritish") {
        if (!evt) {
          ensurePilotName();
          planeType = "dh1";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = "Tap or press SPACE to fly - guns fire automatically";
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        let clickedRow = null;
        for (const row of britishPlaneChoices) {
          if (x >= row.x && x <= row.x + row.w && y >= row.y && y <= row.y + row.h) {
            clickedRow = row;
            break;
          }
        }

        if (clickedRow) {
          ensurePilotName();
          planeType = clickedRow.planeType;
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = "Tap or press SPACE to fly - guns fire automatically";
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        screen = "splash";
        hintEl.textContent = "Tap a side to enter";
        drawSplash();
        return;
      }

      if (gameOver) {
        gameOver = false;
        screen = "splash";
        updateOverlayVisibility();
        hintEl.textContent = "Tap a side to enter";
        drawSplash();

        // Stop game music when returning to main menu
        if (bgmRun) {
          bgmRun.pause();
          bgmRun.currentTime = 0;  // rewind to start
          bgmStarted = false;      // allow fresh start next game
        }

        return;
      }

      if (screen === "game") {
        flap();
        startGameLoop();
      }
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        handleInput(null);
      }
    });

    window.addEventListener("mousedown", (e) => {
      e.preventDefault();
      handleInput(e);
    });

    window.addEventListener("touchstart", (e) => {
      e.preventDefault();
      handleInput(e);
    }, { passive: false });

    resetGame();
    updateOverlayVisibility();
    drawSplash();
  </script>
</body>
</html>
