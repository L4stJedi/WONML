    function endGame() {
      if (!gameOver) {
        gameOver = true;
        gameRunning = false;
        saveCurrentRunToHangar();
        // submit score once per run
        if (!scoreSubmitted && score > 0) {
          scoreSubmitted = true;
          updateLeaderboardForCurrentPilot();
        }
        // Audio: stop engine loop + play game-over sting
        stopEngineLoop();
        playSFX("sfx_ui_gameover", uiGainNode, 0);
      }
      updateOverlayVisibility();
      drawScene();
    }

    function loop(timestamp) {
      if (!gameRunning) return;

      if (!lastTime) {
        lastTime = timestamp;
        lastSpawnTime = timestamp;
      }
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      update(dt, timestamp);
      drawScene();

      if (gameRunning) requestAnimationFrame(loop);
    }

    function redrawCurrentScreen() {
      if (screen === "testerNotes") {
        drawTesterNotes();
        return;
      }
      if (screen === "splash") {
        drawSplash();
        return;
      }
      if (screen === "campaignMap") {
        drawCampaignMap();
        return;
      }
      if (screen === "settings") {
        drawSettings();
        return;
      }
      if (screen === "hangar") {
        drawHangar();
        return;
      }
      if (screen === "planeSelectGerman") {
        drawGermanPlaneList();
        return;
      }
      if (screen === "planeSelectBritish") {
        drawBritishWIP();
        return;
      }
      if (screen === "game") {
        drawScene();
      }
    }

    function beginCampaignMapPointer(evt) {
      const point = getCanvasCoordinates(evt);
      campaignMapPointerActive = true;
      campaignMapPointerMoved = false;
      campaignMapPointerStart = point;
      campaignMapLastPoint = point;
    }

    function updateCampaignMapPointer(evt) {
      if (!campaignMapPointerActive || screen !== "campaignMap") return;
      const point = getCanvasCoordinates(evt);
      const dx = point.x - campaignMapLastPoint.x;
      const dy = point.y - campaignMapLastPoint.y;
      const startDx = point.x - campaignMapPointerStart.x;
      const startDy = point.y - campaignMapPointerStart.y;

      if (Math.abs(startDx) > 6 || Math.abs(startDy) > 6) {
        campaignMapPointerMoved = true;
      }

      if (campaignMapPointerMoved) {
        campaignMapPanX += dx;
        campaignMapPanY += dy;
        clampCampaignMapPan();
        drawCampaignMap();
      }

      campaignMapLastPoint = point;
    }

    function endCampaignMapPointer(evt) {
      if (!campaignMapPointerActive || screen !== "campaignMap") return;

      const point = evt ? getCanvasCoordinates(evt) : campaignMapLastPoint;
      const inside = (r) => r && point.x >= r.x && point.x <= r.x + r.w && point.y >= r.y && point.y <= r.y + r.h;

      if (!campaignMapPointerMoved) {
        if (inside(campaignMapBackRect)) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
        } else if (inside(mapFactionBritishRect)) {
          mapFaction = "british";
          drawCampaignMap();
        } else if (inside(mapFactionGermanRect)) {
          mapFaction = "german";
          drawCampaignMap();
        } else if (inside(campaignMapStartRect)) {
          startSelectedCampaign();
        } else {
          const clickedMarker = campaignMarkerRects.find(rect => inside(rect));
          if (clickedMarker) {
            selectedCampaignMapId = clickedMarker.id;
            drawCampaignMap();
          }
        }
      }

      campaignMapPointerActive = false;
      campaignMapPointerMoved = false;
      campaignMapPointerStart = null;
      campaignMapLastPoint = null;
    }

    // ---- Hangar description scroll drag ----
    function insideRect(r, x, y) {
      return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    }

    function stopHangarDescMomentum() {
      if (hangarDescMomentumRaf) {
        cancelAnimationFrame(hangarDescMomentumRaf);
        hangarDescMomentumRaf = 0;
      }
    }

    function beginHangarDescPointer(evt) {
      if (screen !== "hangar") return false;
      const point = getCanvasCoordinates(evt);
      if (!insideRect(hangarDescPanelRect, point.x, point.y)) return false;
      stopHangarDescMomentum();
      hangarDescPointerActive = true;
      hangarDescPointerMoved = false;
      hangarDescPointerStartY = point.y;
      hangarDescPointerLastY = point.y;
      hangarDescScrollAtStart = hangarDescScrollY;
      hangarDescVelocity = 0;
      return true;
    }

    function updateHangarDescPointer(evt) {
      if (!hangarDescPointerActive || screen !== "hangar") return;
      const point = getCanvasCoordinates(evt);
      const dy = point.y - hangarDescPointerLastY;
      if (Math.abs(point.y - hangarDescPointerStartY) > 4) hangarDescPointerMoved = true;
      hangarDescVelocity = dy;
      hangarDescScrollY = Math.max(0, Math.min(
        hangarDescScrollAtStart + (hangarDescPointerStartY - point.y),
        hangarDescScrollMax
      ));
      hangarDescPointerLastY = point.y;
      drawHangar();
    }

    function endHangarDescPointer() {
      if (!hangarDescPointerActive) return;
      hangarDescPointerActive = false;

      // Momentum deceleration over ~400ms
      let velocity = -hangarDescVelocity * 3; // invert: dragging down scrolls down
      const startTime = performance.now();
      const DECAY_MS = 400;

      function momentum(ts) {
        const elapsed = ts - startTime;
        if (elapsed >= DECAY_MS || Math.abs(velocity) < 0.3) {
          hangarDescMomentumRaf = 0;
          return;
        }
        const factor = 1 - elapsed / DECAY_MS;
        hangarDescScrollY = Math.max(0, Math.min(hangarDescScrollY + velocity * factor, hangarDescScrollMax));
        drawHangar();
        hangarDescMomentumRaf = requestAnimationFrame(momentum);
      }

      hangarDescMomentumRaf = requestAnimationFrame(momentum);
    }
    // ---- end hangar description scroll ----

    function getCanvasCoordinates(evt) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;

      if (evt.touches && evt.touches.length > 0) {
        clientX = evt.touches[0].clientX;
        clientY = evt.touches[0].clientY;
      } else if (evt.changedTouches && evt.changedTouches.length > 0) {
        clientX = evt.changedTouches[0].clientX;
        clientY = evt.changedTouches[0].clientY;
      } else {
        clientX = evt.clientX;
        clientY = evt.clientY;
      }

      const x = ((clientX - rect.left) / rect.width) * W;
      const y = ((clientY - rect.top) / rect.height) * H;
      return { x, y };
    }

    function handleInput(evt) {
      if (!accessUnlocked) return;

      // start music on first interaction
      startBgmIfNeeded();
      ensureAirplaneSmokePlayback();

      if (screen === "testerNotes") {
        if (!evt) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        const inside = (r) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
        if (inside(testerNotesContinueRect)) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
        }
        return;
      }

      if (screen === "splash") {
        if (evt) {
          const { x, y } = getCanvasCoordinates(evt);

          function inside(r) {
            return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
          }

          if (inside(germanEntryRect)) {
            screen = "planeSelectGerman";
            drawGermanPlaneList();
            return;
          }
          if (inside(britishEntryRect)) {
            screen = "planeSelectBritish";
            drawBritishWIP();
            return;
          }
          if (inside(campaignMapEntryRect)) {
            openCampaignMap();
            return;
          }
          if (inside(settingsEntryRect)) {
            screen = "settings";
            drawSettings();
            return;
          }
          if (inside(hangarEntryRect)) {
            currentHangarFaction = currentFaction;
            currentHangarSection = "service";
            selectedHangarPlaneType = planeType;
            screen = "hangar";
            drawHangar();
            return;
          }
          return;
        } else {
          ensurePilotName();
          planeType = "e3std";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = GAMEPLAY_HINT;
          resetGame();
          flap();
          startGameLoop();
          return;
        }
      }

      if (screen === "campaignMap") {
        if (!evt) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        beginCampaignMapPointer(evt);
        return;
      }

      if (screen === "settings") {
        if (!evt) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        const inside = (r) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

        if (inside(settingsBackRect)) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        if (inside(settingsFireHandRect)) {
          burstHand = burstHand === "left" ? "right" : "left";
          localStorage.setItem(STORAGE_KEYS.burstHand, burstHand);
          updateBurstHandUi();
          drawSettings();
          return;
        }

        // Music volume
        if (inside(settingsMusicVolDecRect)) { setMusicVolume(musicVolume - 0.1); drawSettings(); return; }
        if (inside(settingsMusicVolIncRect)) { setMusicVolume(musicVolume + 0.1); drawSettings(); return; }

        // Game sounds volume
        if (inside(settingsSFXVolDecRect)) { setSFXVolume(sfxVolume - 0.1); drawSettings(); return; }
        if (inside(settingsSFXVolIncRect)) { setSFXVolume(sfxVolume + 0.1); drawSettings(); return; }

        // Master volume
        if (inside(settingsVolDecRect)) { setMasterVolume(masterVolume - 0.1); drawSettings(); return; }
        if (inside(settingsVolIncRect)) { setMasterVolume(masterVolume + 0.1); drawSettings(); return; }

        return;
      }

      if (screen === "hangar") {
        if (!evt) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        const inside = (r) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

        if (inside(hangarBackRect)) {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }

        const clickedTab = hangarFactionTabs.find(tab => inside(tab));
        if (clickedTab) {
          currentHangarFaction = clickedTab.faction;
          currentHangarSection = "service";
          hangarDescScrollY = 0;
          hangarDescScrollMax = 0;
          ensureHangarSelection();
          drawHangar();
          return;
        }

        const clickedSection = hangarSectionTabs.find(tab => inside(tab));
        if (clickedSection) {
          currentHangarSection = clickedSection.section;
          hangarDescScrollY = 0;
          hangarDescScrollMax = 0;
          ensureHangarSelection();
          drawHangar();
          return;
        }

        const clickedPlane = hangarPlaneChoices.find(choice => inside(choice));
        if (clickedPlane) {
          selectedHangarPlaneType = clickedPlane.key;
          hangarDescScrollY = 0;
          hangarDescScrollMax = 0;
          drawHangar();
          return;
        }

        // If the tap was inside the description scroll panel (or was a drag on it),
        // do not navigate away — the scroll handlers manage that interaction.
        if (insideRect(hangarDescPanelRect, x, y)) {
          return;
        }

        screen = "splash";
        hintEl.textContent = MAIN_MENU_HINT;
        drawSplash();
        return;
      }

      if (screen === "planeSelectGerman") {
        if (!evt) {
          ensurePilotName();
          planeType = "e3std";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = GAMEPLAY_HINT;
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        let clickedRow = null;
        for (const row of germanPlaneChoices) {
          if (x >= row.x && x <= row.x + row.w && y >= row.y && y <= row.y + row.h) {
            clickedRow = row;
            break;
          }
        }

        if (clickedRow) {
          if (!clickedRow.unlocked) {
            const gate = PLANE_UNLOCK_GATES[clickedRow.planeType];
            const gateNode = gate ? CAMPAIGN_MAP_NODES.find(n => n.id === gate) : null;
            hintEl.textContent = gateNode
              ? `${clickedRow.tier} locked. Complete the ${gateNode.label} campaign to unlock.`
              : `${clickedRow.tier} locked.`;
            return;
          }
          ensurePilotName();
          planeType = clickedRow.planeType;
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = GAMEPLAY_HINT;
          resetGame();
          flap();
          startGameLoop();
          return;
        } else {
          screen = "splash";
          hintEl.textContent = MAIN_MENU_HINT;
          drawSplash();
          return;
        }
      }

      if (screen === "planeSelectBritish") {
        if (!evt) {
          ensurePilotName();
          planeType = "dh1";
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = GAMEPLAY_HINT;
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        let clickedRow = null;
        for (const row of britishPlaneChoices) {
          if (x >= row.x && x <= row.x + row.w && y >= row.y && y <= row.y + row.h) {
            clickedRow = row;
            break;
          }
        }

        if (clickedRow) {
          if (!clickedRow.unlocked) {
            const gate = PLANE_UNLOCK_GATES[clickedRow.planeType];
            const gateNode = gate ? CAMPAIGN_MAP_NODES.find(n => n.id === gate) : null;
            hintEl.textContent = gateNode
              ? `${clickedRow.tier} locked. Complete the ${gateNode.label} campaign to unlock.`
              : `${clickedRow.tier} locked.`;
            return;
          }
          ensurePilotName();
          planeType = clickedRow.planeType;
          screen = "game";
          updateOverlayVisibility();
          hintEl.textContent = GAMEPLAY_HINT;
          resetGame();
          flap();
          startGameLoop();
          return;
        }

        screen = "splash";
        hintEl.textContent = MAIN_MENU_HINT;
        drawSplash();
        return;
      }

      if (gameOver) {
        if (!evt) {
          restartCurrentRun();
          return;
        }

        const { x, y } = getCanvasCoordinates(evt);
        const inside = (r) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
        if (inside(gameOverRestartRect)) {
          restartCurrentRun();
          return;
        }
        if (inside(gameOverMenuRect)) {
          returnToMainMenu();
          return;
        }
        return;
      }

      if (screen === "game") {
        flap();
        startGameLoop();
      }
    }

    window.addEventListener("keydown", (e) => {
      if (!accessUnlocked) return;
      if (screen === "testerNotes" && (e.code === "Space" || e.code === "Enter" || e.code === "Escape")) {
        e.preventDefault();
        screen = "splash";
        hintEl.textContent = MAIN_MENU_HINT;
        drawSplash();
        return;
      }
      if (screen === "settings" && (e.code === "Escape" || e.code === "Backspace")) {
        e.preventDefault();
        screen = "splash";
        hintEl.textContent = MAIN_MENU_HINT;
        drawSplash();
        return;
      }
      if (gameOver && (e.code === "Escape" || e.code === "KeyM")) {
        e.preventDefault();
        returnToMainMenu();
        return;
      }
      if (e.code === "KeyX") {
        e.preventDefault();
        activateBurstMode();
        return;
      }
      if (e.code === "KeyC") {
        e.preventDefault();
        activateRapidFire();
        return;
      }
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        handleInput(null);
      }
    });

    window.addEventListener("mousedown", (e) => {
      if (!accessUnlocked) return;
      e.preventDefault();
      beginHangarDescPointer(e);
      handleInput(e);
    });

    window.addEventListener("mousemove", (e) => {
      if (!accessUnlocked) return;
      if (screen === "campaignMap") {
        e.preventDefault();
        updateCampaignMapPointer(e);
      }
      if (screen === "hangar") {
        e.preventDefault();
        updateHangarDescPointer(e);
      }
    });

    window.addEventListener("mouseup", (e) => {
      if (!accessUnlocked) return;
      if (screen === "campaignMap") {
        e.preventDefault();
        endCampaignMapPointer(e);
      }
      if (screen === "hangar") {
        endHangarDescPointer();
      }
    });

    window.addEventListener("touchstart", (e) => {
      if (!accessUnlocked) return;
      e.preventDefault();
      beginHangarDescPointer(e);
      handleInput(e);
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      if (!accessUnlocked) return;
      if (screen === "campaignMap") {
        e.preventDefault();
        updateCampaignMapPointer(e);
      }
      if (screen === "hangar") {
        e.preventDefault();
        updateHangarDescPointer(e);
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (!accessUnlocked) return;
      if (screen === "campaignMap") {
        e.preventDefault();
        endCampaignMapPointer(e);
      }
      if (screen === "hangar") {
        endHangarDescPointer();
      }
    }, { passive: false });

    let canvasResolutionRaf = 0;
    function queueCanvasResolutionSync() {
      if (canvasResolutionRaf) return;
      canvasResolutionRaf = requestAnimationFrame(() => {
        canvasResolutionRaf = 0;
        syncCanvasResolution();
        syncGameWrapperScale();
        redrawCurrentScreen();
      });
    }

    window.addEventListener("resize", queueCanvasResolutionSync);
    window.addEventListener("orientationchange", queueCanvasResolutionSync);

    syncCanvasResolution();
    syncGameWrapperScale();
    resetGame();
    updateOverlayVisibility();
    drawSplash();
    initEarlyAccessGate();
  </script>
</body>
</html>
