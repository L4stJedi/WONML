        ctx.fillStyle = "rgba(255,255,255,0.7)";
        drawCloudShape(80, 90, 22);
        drawCloudShape(180, 60, 18);
        drawCloudShape(340, 110, 26);
      }

      const groundGradient = ctx.createLinearGradient(0, H - GROUND_HEIGHT, 0, H);
      groundGradient.addColorStop(0, level.ground[0]);
      groundGradient.addColorStop(1, level.ground[1]);
      ctx.fillStyle = groundGradient;
      ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);

      drawParallaxGround();
    }

    function drawCampaignParallaxAsset(asset, offset, widthFactor, bottomY, alpha = 1) {
      if (!asset || !asset.loaded) return false;

      const drawW = W * widthFactor;
      const scale = drawW / asset.img.width;
      const drawH = asset.img.height * scale;
      const tileSpan = Math.max(1, drawW);
      const scroll = ((-offset % tileSpan) + tileSpan) % tileSpan;
      const baseX = (W - drawW) / 2;

      ctx.save();
      ctx.globalAlpha = alpha;
      for (let x = baseX - scroll - drawW; x < W + drawW; x += drawW) {
        ctx.drawImage(asset.img, x, bottomY - drawH, drawW, drawH);
      }
      ctx.restore();
      return true;
    }

    function drawBlendedCampaignParallaxAssets(assets, offset, widthFactor, bottomY, alpha = 1) {
      const readyAssets = (assets || []).filter(asset => asset && asset.loaded);
      if (readyAssets.length === 0) return false;
      if (readyAssets.length === 1) {
        return drawCampaignParallaxAsset(readyAssets[0], offset, widthFactor, bottomY, alpha);
      }

      const drawW = W * widthFactor;
      const scale = drawW / readyAssets[0].img.width;
      const drawH = readyAssets[0].img.height * scale;
      const tileSpan = Math.max(1, drawW);
      const scroll = ((-offset % tileSpan) + tileSpan) % tileSpan;
      const baseX = (W - drawW) / 2;

      ctx.save();
      ctx.globalAlpha = alpha;
      for (let x = baseX - scroll - drawW, tileIndex = -1; x < W + drawW; x += drawW, tileIndex++) {
        const seqIndex = ((tileIndex % readyAssets.length) + readyAssets.length) % readyAssets.length;
        const currentAsset = readyAssets[seqIndex];
        ctx.drawImage(currentAsset.img, x, bottomY - drawH, drawW, drawH);
      }
      ctx.restore();
      return true;
    }

    function drawCustomCampaignLayers(customLayers, groundTop) {
      if (!customLayers) return false;

      // ---- ATMOSPHERE layer (ultra-far, ~0.02x) ----
      // Full-canvas cover image drawn at very low alpha so it blends behind the sky gradient.
      // Acts as a nearly-static horizon haze — makes everything in front feel at a great distance.
      // Draw multipliers: parallax.atmos * 0.20 → 0.10 × 0.20 = 0.020x effective scroll.
      const drewAtmos = drawCampaignParallaxAsset(
        customLayers.atmos,
        parallax.atmos * 0.20,
        1.0,           // 1× canvas width — atmosphere is a full-width cover, no tile stretch needed
        H,             // pin to canvas bottom
        0.55           // semi-transparent: lets sky gradient show through, creates atmospheric haze
      );

      // ---- FAR layer (distant horizon, ~0.08x) ----
      // Reduced global alpha (0.87) simulates aerial perspective — distant things appear lighter
      // and slightly washed out, as if seen through a column of haze-filled air.
      // Draw multiplier updated: 0.267 (was 0.2) → 0.30 × 0.267 = ~0.080x effective scroll.
      const drewFar = drawBlendedCampaignParallaxAssets(
        customLayers.farVariants || [customLayers.far],
        parallax.far * 0.267,
        1.9,
        groundTop + 24,
        0.87           // aerial haze: slightly transparent, simulates distance wash-out (was 0.9)
      );

      // ---- MID layer (mid-distance, ~0.22x) ----
      // Full opacity — this is the "real" layer, reference plane for the player's eye.
      // Draw multiplier updated: 0.367 (was 0.32) → 0.60 × 0.367 = ~0.220x effective scroll.
      const drewMid = drawCampaignParallaxAsset(
        customLayers.mid,
        parallax.mid * 0.367,
        2.05,
        groundTop + 58,
        0.98           // near-full opacity — crisp, fully saturated mid-ground (was 0.95)
      );

      // ---- FORE layer (near terrain, ~0.65x) ----
      // Full opacity, maximum contrast — closest to camera, sharpest perceived detail.
      // Draw multiplier updated: 0.65 (was 0.5) → 1.00 × 0.65 = 0.650x effective scroll.
      const drewFore = drawCampaignParallaxAsset(
        customLayers.fore,
        parallax.fore * 0.65,
        2.2,
        H + 210,
        1.0            // full opacity — foreground is sharpest, highest contrast (unchanged)
      );

      return drewAtmos || drewFar || drewMid || drewFore;
    }

    // === New multi-level parallax ground ===
    function drawParallaxGround() {
      const level = getCurrentStage();
      const p = level.parallax || {};
      const farColor = p.farColor || "#3e5136";
      const midColor = p.midColor || "#7e653e";
      const foreColor = p.foreColor || "#4a3b26";
      const theme = p.theme || "rural";

      const groundTop = H - GROUND_HEIGHT;

      if (drawCustomCampaignLayers(p.customLayers, groundTop)) {
        return;
      }

      // little variation per level so Y offsets change
      const baseOffset = currentStageIndex * 3;
      const farY = groundTop + 16 + baseOffset;
      const midY = groundTop + 30 + baseOffset;
      const foreY = groundTop + 40 + baseOffset;

      // ---- FAR LAYER: distant hills / silhouettes ----
      const farSegW = 140;
      let fx = parallax.far % farSegW;
      if (fx > 0) fx -= farSegW;

      ctx.fillStyle = farColor;
      for (let x = fx; x < W + farSegW; x += farSegW) {
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x, farY + 18);

        if (theme === "battlefield") {
          ctx.quadraticCurveTo(
            x + farSegW * 0.25, farY + 4,
            x + farSegW * 0.5, farY + 14
          );
          ctx.quadraticCurveTo(
            x + farSegW * 0.75, farY + 28,
            x + farSegW, farY + 16
          );
        } else {
          ctx.quadraticCurveTo(
            x + farSegW * 0.25, farY - 6,
            x + farSegW * 0.5, farY + 10
          );
          ctx.quadraticCurveTo(
            x + farSegW * 0.75, farY + 24,
            x + farSegW, farY + 12
          );
        }

        ctx.lineTo(x + farSegW, H);
        ctx.closePath();
        ctx.fill();

        // Forest silhouettes: rural / farmland
        if (theme === "rural" || theme === "farmland") {
          const treeBaseY = farY + 8;
          ctx.fillStyle = "rgba(20,40,20,0.8)";
          for (let i = 0; i < 3; i++) {
            const tx = x + 15 + i * 30;
            ctx.beginPath();
            ctx.moveTo(tx, treeBaseY - 14);
            ctx.lineTo(tx - 6, treeBaseY + 4);
            ctx.lineTo(tx + 6, treeBaseY + 4);
            ctx.closePath();
            ctx.fill();
          }
          ctx.fillStyle = farColor;
        }

        // Factory chimneys in industrial level
        if (theme === "industrial") {
          ctx.fillStyle = "rgba(30,30,35,0.9)";
          const bX = x + farSegW * 0.4;
          const bY = farY + 5;
          ctx.fillRect(bX, bY - 16, 10, 16);
          ctx.fillRect(bX + 16, bY - 22, 8, 22);

          ctx.fillStyle = "rgba(80,80,80,0.6)";
          ctx.beginPath();
          ctx.arc(bX + 18, bY - 26, 5, 0, Math.PI * 2);
          ctx.arc(bX + 22, bY - 32, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = farColor;
        }
      }

      // ---- MID LAYER: fences / fields / trenches / low buildings ----
      const midSegW = 110;
      let mx = parallax.mid % midSegW;
      if (mx > 0) mx -= midSegW;

      for (let x = mx; x < W + midSegW; x += midSegW) {
        if (theme === "industrial") {
          // Low town strip
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY - 6, midSegW * 0.9, 14);
          ctx.fillStyle = "rgba(30,30,30,0.9)";
          for (let w = 0; w < 4; w++) {
            ctx.fillRect(x + 6 + w * 20, midY - 2, 8, 4);
          }
        } else if (theme === "battlefield") {
          // Trenches
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY + 4, midSegW * 0.7, 10);

          ctx.strokeStyle = "rgba(20,10,5,0.9)";
          ctx.lineWidth = 1.3;
          ctx.beginPath();
          ctx.moveTo(x, midY + 2);
          ctx.lineTo(x + midSegW * 0.7, midY + 2);
          ctx.stroke();

          ctx.strokeStyle = "rgba(40,30,20,0.9)";
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const px = x + 8 + i * 16;
            ctx.moveTo(px, midY + 2);
            ctx.lineTo(px - 3, midY - 10);
          }
          ctx.stroke();
        } else {
          // Original fence strip for rural/farmland
          ctx.fillStyle = midColor;
          ctx.fillRect(x, midY + 4, midSegW * 0.7, 8);

          ctx.fillStyle = "#5b4a30";
          ctx.beginPath();
          ctx.ellipse(x + midSegW * 0.35, midY + 10, 10, 4, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(40,30,20,0.9)";
          ctx.lineWidth = 1.3;
          ctx.beginPath();
          ctx.moveTo(x + 6, midY);
          ctx.lineTo(x + 6, midY - 8);
          ctx.moveTo(x + 26, midY);
          ctx.lineTo(x + 26, midY - 7);
          ctx.stroke();

          ctx.strokeStyle = "rgba(80,60,40,0.8)";
          ctx.lineWidth = 0.9;
          ctx.beginPath();
          ctx.moveTo(x + 6, midY - 7);
          ctx.lineTo(x + 26, midY - 6);
          ctx.stroke();

          // Hay bales on farmland
          if (theme === "farmland") {
            ctx.fillStyle = "rgba(235, 203, 139, 0.85)";
            ctx.beginPath();
            ctx.ellipse(x + 50, midY + 6, 7, 4, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // ---- FOREGROUND LAYER: bunkers / craters / buildings ----
      const foreSegW = 130;
      let bx = parallax.fore % foreSegW;
      if (bx > 0) bx -= foreSegW;

      for (let x = bx; x < W + foreSegW; x += foreSegW) {
        ctx.fillStyle = foreColor;

        ctx.beginPath();
        ctx.moveTo(x, foreY + 10);
        ctx.lineTo(x + 18, foreY + 4);
        ctx.lineTo(x + 40, foreY + 12);
        ctx.lineTo(x + 68, foreY + 6);
        ctx.lineTo(x + 92, foreY + 14);
        ctx.lineTo(x + foreSegW, foreY + 8);
        ctx.lineTo(x + foreSegW, H);
        ctx.lineTo(x, H);
        ctx.closePath();
        ctx.fill();

        if (theme === "industrial") {
          // Buildings close to camera
          ctx.fillStyle = "rgba(35,35,40,0.95)";
          const b1x = x + 18;
          const b1y = foreY - 4;
          ctx.fillRect(b1x, b1y - 22, 26, 22);
          ctx.fillRect(b1x + 32, b1y - 16, 20, 16);

          ctx.fillStyle = "rgba(250,250,210,0.6)";
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(b1x + 4 + i * 7, b1y - 16, 4, 4);
          }
        } else if (theme === "battlefield") {
          // Craters + barbed wire
          ctx.fillStyle = "rgba(30,20,15,0.9)";
          ctx.beginPath();
          ctx.ellipse(x + 30, foreY + 12, 10, 4, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 70, foreY + 16, 12, 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(15,10,8,0.9)";
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.moveTo(x + 6, foreY + 2);
          ctx.lineTo(x + foreSegW - 10, foreY - 2);
          ctx.stroke();

          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const px = x + 10 + i * 18;
            ctx.moveTo(px, foreY);
            ctx.lineTo(px + 4, foreY - 8);
          }
          ctx.stroke();
        } else {
          // Original bunker & smoke for rural/farmland
          ctx.fillStyle = "#34312c";
          const bunkX = x + 24;
          const bunkY = foreY - 6;
          ctx.fillRect(bunkX, bunkY, 32, 16);

          ctx.fillStyle = "#1b1a18";
          ctx.fillRect(bunkX + 8, bunkY + 7, 18, 7);

          const smokeBaseX = bunkX + 26;
          const smokeBaseY = bunkY - 4;
          ctx.fillStyle = "rgba(90,90,90,0.6)";
          ctx.beginPath();
          ctx.arc(smokeBaseX, smokeBaseY, 6, 0, Math.PI * 2);
          ctx.arc(smokeBaseX + 6, smokeBaseY - 6, 5, 0, Math.PI * 2);
          ctx.arc(smokeBaseX - 4, smokeBaseY - 10, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawCloudShape(cx, cy, r) {
      ctx.beginPath();
      ctx.arc(cx - r, cy, r, Math.PI * 0.5, Math.PI * 1.5);
      ctx.arc(cx, cy - r, r, Math.PI, 0);
      ctx.arc(cx + r, cy, r, Math.PI * 1.5, Math.PI * 0.5);
      ctx.closePath();
      ctx.fill();
    }

    function drawStar6(cx, cy, outerR, innerR, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;

      ctx.beginPath();
      const spikes = 6;
      const step = Math.PI / spikes;
      let rot = -Math.PI / 2;

      for (let i = 0; i < spikes * 2; i++) {
        const r = (i % 2 === 0) ? outerR : innerR;
        const x = cx + Math.cos(rot) * r;
        const y = cy + Math.sin(rot) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        rot += step;
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function traceFlakCloudPath(cx, cy, smokeR) {
      ctx.beginPath();
      ctx.arc(cx - smokeR * 0.34, cy + smokeR * 0.06, smokeR * 0.4, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.32, cy, smokeR * 0.34, 0, Math.PI * 2);
      ctx.arc(cx - smokeR * 0.02, cy - smokeR * 0.28, smokeR * 0.46, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.06, cy + smokeR * 0.24, smokeR * 0.38, 0, Math.PI * 2);
    }

    function drawFlakCloud(cx, cy, baseR, age = 0) {
      const ageNorm = Math.min(1, age / 260);
      const smokeR = baseR * (0.9 + ageNorm * 0.25);
      const flash = Math.max(0, 1 - ageNorm * 2.4);
      const shardAlpha = Math.max(0, 0.9 - ageNorm * 1.1);

      ctx.save();

      if (flash > 0) {
        const flashR = smokeR * (0.32 + flash * 0.18);
        const flashGrad = ctx.createRadialGradient(
          cx, cy, flashR * 0.08,
          cx, cy, flashR
        );
        flashGrad.addColorStop(0, `rgba(255,252,236,${0.96 * flash})`);
        flashGrad.addColorStop(0.38, `rgba(255,202,96,${0.82 * flash})`);
        flashGrad.addColorStop(0.74, `rgba(255,122,36,${0.46 * flash})`);
        flashGrad.addColorStop(1, "rgba(80,24,12,0)");
        ctx.fillStyle = flashGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, flashR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 0.92;
      ctx.fillStyle = "rgba(48,46,45,0.92)";
      ctx.strokeStyle = "rgba(24,22,20,0.62)";
      ctx.lineWidth = Math.max(1.2, smokeR * 0.07);

      traceFlakCloudPath(cx, cy, smokeR);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(118,112,104,0.2)";
      ctx.beginPath();
      ctx.arc(cx - smokeR * 0.08, cy - smokeR * 0.14, smokeR * 0.18, 0, Math.PI * 2);
      ctx.arc(cx + smokeR * 0.1, cy - smokeR * 0.08, smokeR * 0.12, 0, Math.PI * 2);
      ctx.fill();

      if (shardAlpha > 0) {
        const shardLen = smokeR * (0.46 + flash * 0.18);
        ctx.strokeStyle = `rgba(255,224,176,${0.42 * shardAlpha})`;
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = -Math.PI / 2 + i * (Math.PI * 0.4);
          const sx = cx + Math.cos(angle) * smokeR * 0.22;
          const sy = cy + Math.sin(angle) * smokeR * 0.22;
          const ex = cx + Math.cos(angle) * shardLen;
          const ey = cy + Math.sin(angle) * shardLen;
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawObstacle(o) {
      if (o.type === "cloud") {
        const cloudAsset = cloudAssets[o.cloudIndex || 0];
        if (cloudAsset?.loaded) {
          const drawW = Math.max(86, o.r * 4.6);
          const drawH = drawW * cloudAsset.img.height / cloudAsset.img.width;
          ctx.save();
          ctx.globalAlpha = 0.96;
          ctx.drawImage(
            cloudAsset.img,
            o.x - drawW / 2,
            o.y - drawH / 2,
            drawW,
            drawH
          );
          ctx.restore();
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          drawCloudShape(o.x, o.y, o.r);
        }
      } else if (o.type === "balloon") {
        const balloonAsset = getBalloonObstacleAsset(o.variant);
        if (balloonAsset.loaded) {
          const imgW = balloonAsset.drawWidth;
          const imgH = imgW * balloonAsset.img.height / balloonAsset.img.width;
          ctx.drawImage(
            balloonAsset.img,
            o.x - imgW / 2,
            o.y - imgH / 2,
            imgW,
            imgH
          );
        } else {
          ctx.fillStyle = "#e0c68b";
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (o.type === "zeppelin") {
        if (zeppelinLoaded) {
          const scale = 0.45;
          const imgW = zeppelinImg.width * scale;
          const imgH = zeppelinImg.height * scale;
          ctx.drawImage(
            zeppelinImg,
            o.x - imgW / 2,
            o.y - imgH / 2,
            imgW,
            imgH
          );
        } else {
          ctx.fillStyle = "#c6b38c";
          ctx.beginPath();
          ctx.ellipse(o.x, o.y, o.r * 1.7, o.r, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (o.type === "flak") {
        const age = o.age || 0;
        const burstFactor = Math.min(1, age / 140);
        const baseR = o.r * burstFactor;
        const videoAgeLimit = 760;
        const useVideo = o.video && o.videoReady && o.video.readyState >= 2 && age < videoAgeLimit;

        if (useVideo) {
          const aspect = Math.max(0.1, o.video.videoWidth / Math.max(1, o.video.videoHeight));
          const desiredH = Math.max(baseR * 3.2, 68);
          const desiredW = desiredH * aspect;
          const settleAlpha = age < 120 ? Math.min(1, age / 80) : Math.max(0.68, 1 - ((age - 120) / 900));
          const smokeR = Math.max(baseR * 1.12, 24);
          ctx.save();
          ctx.globalAlpha = settleAlpha;
          traceFlakCloudPath(o.x, o.y, smokeR);
          ctx.clip();
          ctx.drawImage(
            o.video,
            o.x - desiredW / 2,
            o.y - desiredH / 2,
            desiredW,
            desiredH
          );
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = Math.min(0.34, settleAlpha * 0.34);
          ctx.fillStyle = "rgba(42,40,38,0.9)";
          traceFlakCloudPath(o.x, o.y, smokeR);
          ctx.fill();
          ctx.restore();
        } else {
          drawFlakCloud(o.x, o.y, baseR, age);
        }
      }
    }

    function drawEnemy(enemy) {
      if (enemy.type === "zeppelin") {
        if (zeppelinLoaded) {
          const scale = 0.38;
          const imgW = zeppelinImg.width * scale;
          const imgH = zeppelinImg.height * scale;
          ctx.drawImage(zeppelinImg, enemy.x - imgW / 2, enemy.y - imgH / 2, imgW, imgH);
          return;
        }

        ctx.fillStyle = "#788d95";
        ctx.beginPath();
        ctx.ellipse(enemy.x, enemy.y, enemy.width * 0.52, enemy.height * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      const enemyPlaneType = getEnemyPlaneType(enemy.type);
      const sprite = getPlaneSprite(enemyPlaneType);

      if (!sprite.loaded) {
        ctx.save();
        ctx.fillStyle = "rgba(35, 35, 38, 0.7)";
        ctx.beginPath();
        ctx.ellipse(enemy.x, enemy.y, enemy.width * 0.42, enemy.height * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }

      const desiredWidth = sprite.gameplayWidth * (enemy.type.includes("bomber") ? 0.88 : 0.8);
      const { imgW, imgH } = getSpriteDrawSize(sprite, desiredWidth);
      const rotation = sprite.rotation || 0;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#1b2432";
      ctx.beginPath();
      ctx.ellipse(0, 0, imgW * 0.34, imgH * 0.24, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = "rgba(255, 244, 218, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, imgW * 0.3, imgH * 0.2, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.rotate(-rotation);
      ctx.scale(-1, 1);
      ctx.filter = "brightness(0.74) saturate(0.86) contrast(1.08)";
      ctx.globalAlpha = 0.96;
      ctx.drawImage(sprite.img, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.filter = "none";
      ctx.restore();
    }

    function drawPlayerShot(shot) {
      ctx.save();
      const glow = ctx.createRadialGradient(shot.x, shot.y, 0, shot.x, shot.y, shot.r * 2.3);
      glow.addColorStop(0, "rgba(255, 250, 220, 0.98)");
      glow.addColorStop(0.38, "rgba(255, 196, 84, 0.7)");
      glow.addColorStop(1, "rgba(255, 140, 0, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(shot.x, shot.y, shot.r * 2.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 170, 40, 0.95)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(shot.x - 9, shot.y);
      ctx.lineTo(shot.x + 1, shot.y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 244, 194, 0.95)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(shot.x - 6, shot.y);
      ctx.lineTo(shot.x + 2, shot.y);
      ctx.stroke();

      ctx.fillStyle = "#fffaf0";
      ctx.beginPath();
      ctx.arc(shot.x, shot.y, shot.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffb300";
      ctx.beginPath();
      ctx.arc(shot.x - 1, shot.y, shot.r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSmokePuff(cx, cy, baseR, alpha, shade) {
      ctx.save();
      ctx.globalAlpha = alpha;
      const phase = performance.now() * 0.004;
      const driftX = Math.sin(phase + cx * 0.01) * baseR * 0.08;
      const driftY = Math.cos(phase * 0.8 + cy * 0.01) * baseR * 0.05;
      const puffX = cx + driftX;
      const puffY = cy + driftY;
      const outlineAlpha = Math.min(1, alpha * 1.15);

      ctx.fillStyle = shade;
      ctx.strokeStyle = `rgba(40, 34, 30, ${outlineAlpha})`;
      ctx.lineWidth = Math.max(1.25, baseR * 0.12);
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.arc(puffX - baseR * 0.46, puffY + baseR * 0.08, baseR * 0.56, Math.PI * 0.35, Math.PI * 1.78);
      ctx.arc(puffX - baseR * 0.04, puffY - baseR * 0.28, baseR * 0.72, Math.PI * 0.9, Math.PI * 2.12);
      ctx.arc(puffX + baseR * 0.42, puffY - baseR * 0.02, baseR * 0.5, Math.PI * 1.18, Math.PI * 0.28);
      ctx.arc(puffX + baseR * 0.1, puffY + baseR * 0.34, baseR * 0.64, Math.PI * 1.88, Math.PI * 0.88, true);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(236, 231, 223, 0.18)";
      ctx.beginPath();
      ctx.ellipse(
        puffX - baseR * 0.12,
        puffY - baseR * 0.22,
        baseR * 0.46,
        baseR * 0.24,
        -0.25,
        0,
        Math.PI * 2
      );
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 250, 244, ${Math.min(0.26, alpha * 0.34)})`;
      ctx.lineWidth = Math.max(0.8, baseR * 0.05);
      ctx.beginPath();
      ctx.arc(puffX - baseR * 0.18, puffY - baseR * 0.18, baseR * 0.26, Math.PI * 1.1, Math.PI * 1.85);
      ctx.stroke();

      ctx.restore();
    }

    function drawEngineSmokeTrail(cx, cy, width, alpha) {
      if (!airplaneSmokeVideo || airplaneSmokeVideo.readyState < 1) {
        return false;
      }

      const videoW = airplaneSmokeVideo.videoWidth || 1;
      const videoH = airplaneSmokeVideo.videoHeight || 1;
      if (!airplaneSmokeReady && (videoW <= 1 || videoH <= 1)) {
        return false;
      }
      const aspect = videoW / videoH;
      const drawW = width;
      const drawH = drawW / Math.max(0.2, aspect);
      const smokeR = drawH * 0.46;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx, cy);
      ctx.scale(-1, 1);
      ctx.beginPath();
      ctx.arc(-drawW * 0.02, drawH * 0.02, smokeR * 0.78, 0, Math.PI * 2);
      ctx.arc(drawW * 0.22, -drawH * 0.08, smokeR * 0.64, 0, Math.PI * 2);
      ctx.arc(drawW * 0.46, drawH * 0.02, smokeR * 0.5, 0, Math.PI * 2);
      ctx.arc(drawW * 0.66, drawH * 0.03, smokeR * 0.34, 0, Math.PI * 2);
      ctx.arc(drawW * 0.82, drawH * 0.04, smokeR * 0.2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(
        airplaneSmokeVideo,
        -drawW * 0.3,
        -drawH * 0.5,
        drawW,
        drawH
      );
      ctx.fillStyle = "rgba(54, 52, 50, 0.12)";
      ctx.beginPath();
      ctx.arc(-drawW * 0.02, drawH * 0.02, smokeR * 0.78, 0, Math.PI * 2);
      ctx.arc(drawW * 0.22, -drawH * 0.08, smokeR * 0.64, 0, Math.PI * 2);
      ctx.arc(drawW * 0.46, drawH * 0.02, smokeR * 0.5, 0, Math.PI * 2);
      ctx.arc(drawW * 0.66, drawH * 0.03, smokeR * 0.34, 0, Math.PI * 2);
      ctx.arc(drawW * 0.82, drawH * 0.04, smokeR * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return true;
    }

    function drawPlane() {
      const { x, y, width, height } = plane;
      const cx = x + width * 0.5;
      const cy = y + height * 0.5;

      const sprite = getPlaneSprite(planeType);
      const img = sprite.img;
      const loaded = sprite.loaded;
      const rotation = sprite.rotation || 0;

      if (!loaded) {
        ctx.fillStyle = "red";
        fillRoundedRect(x, y, width, height, 4);
        return;
      }

      const { imgW: imgWidth, imgH: imgHeight } = getSpriteDrawSize(sprite, sprite.gameplayWidth);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      ctx.drawImage(
        img,
        -imgWidth / 2,
        -imgHeight / 2,
        imgWidth,
        imgHeight
      );
      ctx.restore();

      const noseOffsetX = imgWidth * 0.35;
      const noseOffsetY = 0;
      const noseX = cx + Math.cos(rotation) * noseOffsetX - Math.sin(rotation) * noseOffsetY;
      const noseY = cy + Math.sin(rotation) * noseOffsetX + Math.cos(rotation) * noseOffsetY;

      if (damageLevel >= 1 && damageLevel < 3) {
        const R = imgWidth * 0.09;
        const smokeAlpha = damageLevel >= 2 ? 0.92 : 0.8;
        const smokeDrawn = drawEngineSmokeTrail(
          noseX - imgWidth * 0.13,
          noseY - imgHeight * 0.08,
          imgWidth * (damageLevel >= 2 ? 0.82 : 0.68),
          smokeAlpha
        );

        if (!smokeDrawn) {
          drawSmokePuff(
            noseX - 4,
            noseY - 6,
            R,
            0.8,
            "rgb(90,90,90)"
          );

          drawSmokePuff(
            noseX - 14,
            noseY - 10,
            R * 1.5,
            0.6,
            "rgb(120,120,120)"
          );

          drawSmokePuff(
            noseX - 28,
            noseY - 14,
            R * 2.0,
            0.4,
            "rgb(150,150,150)"
          );
        }
      }

      if (damageLevel >= 2 && damageLevel < 3) {
        const flamePhase = performance.now() * 0.02;
        const flameLen = imgWidth * (0.17 + Math.sin(flamePhase) * 0.015);
        const flameHeight = imgHeight * (0.16 + Math.cos(flamePhase * 0.85) * 0.012);

        ctx.save();
        ctx.translate(noseX - imgWidth * 0.01, noseY - imgHeight * 0.02);
        ctx.rotate(rotation);

        ctx.fillStyle = "rgba(255,132,24,0.9)";
        ctx.beginPath();
        ctx.moveTo(flameLen * 0.12, 0);
        ctx.quadraticCurveTo(-flameLen * 0.12, -flameHeight * 0.9, -flameLen, -flameHeight * 0.16);
        ctx.quadraticCurveTo(-flameLen * 0.72, 0, -flameLen, flameHeight * 0.16);
        ctx.quadraticCurveTo(-flameLen * 0.12, flameHeight * 0.9, flameLen * 0.12, 0);
        ctx.fill();

        ctx.fillStyle = "rgba(255,228,120,0.9)";
        ctx.beginPath();
        ctx.moveTo(flameLen * 0.04, 0);
        ctx.quadraticCurveTo(-flameLen * 0.06, -flameHeight * 0.48, -flameLen * 0.64, -flameHeight * 0.08);
        ctx.quadraticCurveTo(-flameLen * 0.48, 0, -flameLen * 0.64, flameHeight * 0.08);
        ctx.quadraticCurveTo(-flameLen * 0.06, flameHeight * 0.48, flameLen * 0.04, 0);
        ctx.fill();

        ctx.restore();
      }

      if (damageLevel >= 3) {
        ctx.save();
        ctx.globalAlpha = 0.9;
        const explodeR = imgWidth * 0.6;
        const grad = ctx.createRadialGradient(
          cx, cy, explodeR * 0.2,
          cx, cy, explodeR
        );
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.3, "rgba(255,200,0,1)");
        grad.addColorStop(0.7, "rgba(255,80,0,0.9)");
        grad.addColorStop(1, "rgba(80,20,0,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, explodeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFogOverlay() {
      if (score < 100) return;

      const extra = Math.min((score - 100) * 0.003, 0.25);
      const alphaBottom = 0.30 + extra;
      const alphaTop = alphaBottom * 0.8;

      ctx.save();
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, `rgba(255,255,255, ${alphaTop.toFixed(3)})`);
      grad.addColorStop(1, `rgba(255,255,255, ${alphaBottom.toFixed(3)})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    function drawScene() {
      drawBackground();

      for (const o of obstacles) {
        drawObstacle(o);
      }
      for (const enemy of enemies) {
        drawEnemy(enemy);
      }
      for (const shot of playerShots) {
        drawPlayerShot(shot);
      }
      drawPlane();

      drawFogOverlay();

      if (!gameOver && activeCampaignIntro && performance.now() < campaignIntroUntil) {
        const now = performance.now();
        const timeLeft = campaignIntroUntil - now;
        const introAlpha = Math.min(1, Math.max(0, Math.min((4200 - timeLeft) / 450, timeLeft / 900)));

        ctx.save();
        ctx.globalAlpha = introAlpha;
        ctx.fillStyle = "rgba(20, 18, 15, 0.42)";
        fillRoundedRect(56, 92, W - 112, 78, 16);

        ctx.textAlign = "center";
        ctx.fillStyle = "#ffe7ad";
        ctx.font = "700 22px " + UI_FONT;
        // intro box is W-112 wide; keep 16px padding each side → maxWidth = W-144
        drawTruncatedText(activeCampaignIntro.title, W / 2, 122, W - 144);

        ctx.fillStyle = "#fff4d8";
        ctx.font = "16px " + UI_FONT;
        drawTruncatedText(activeCampaignIntro.subtitle, W / 2, 148, W - 144);
        ctx.restore();
      }

      if (gameOver) {
        const modalW = 354;
        const modalH = 312;
        const modalX = (W - modalW) / 2;
        const modalY = (H - modalH) / 2 - 8;
        const lineX = modalX + 24;
        const statStartY = modalY + 98;
        const playerBest = getCurrentPilotBestScore() || 0;
        const runDuration = formatRunDuration(roundStartTime ? performance.now() - roundStartTime : 0);

        ctx.fillStyle = "rgba(8, 10, 14, 0.62)";
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = "rgba(25, 22, 18, 0.88)";
        fillRoundedRect(modalX, modalY, modalW, modalH, 20);
        ctx.strokeStyle = "rgba(255, 231, 174, 0.28)";
        ctx.lineWidth = 1.6;
        ctx.strokeRect(modalX + 0.8, modalY + 0.8, modalW - 1.6, modalH - 1.6);

        ctx.textAlign = "center";
        ctx.font = "28px " + UI_FONT;
        ctx.fillStyle = "#ffeb3b";
        ctx.fillText("Patrol Report", W / 2, modalY + 38);

        ctx.font = "18px " + UI_FONT;
        ctx.fillStyle = "#ffe7ad";
        ctx.fillText(`Score: ${score}`, W / 2, modalY + 66);

        ctx.textAlign = "left";
        ctx.font = "13px " + UI_FONT;
        ctx.fillStyle = "#fff4d5";
        const statLineW = modalW - 48; // 16px padding each side inside modal
        drawTruncatedText(`Pilot: ${currentPilotName || "Unknown"}`, lineX, statStartY, statLineW);
        drawTruncatedText(`Your best: ${playerBest}`, lineX, statStartY + 28, statLineW);
        drawTruncatedText(`Kills: ${runPlaneKills}  \u2022  XP banked: ${xpPoints}`, lineX, statStartY + 56, statLineW);
        drawTruncatedText(`Stage reached: ${getCurrentStage().name}`, lineX, statStartY + 84, statLineW);
        drawTruncatedText(`Time aloft: ${runDuration}`, lineX, statStartY + 112, statLineW);
        drawTruncatedText(`Top Ace: ${formatTopAceLine()}`, lineX, statStartY + 140, statLineW);

        gameOverRestartRect = { x: modalX + 26, y: modalY + modalH - 58, w: 140, h: 36 };
        gameOverMenuRect = { x: modalX + modalW - 166, y: modalY + modalH - 58, w: 140, h: 36 };

        ctx.fillStyle = "rgba(214, 174, 86, 0.96)";
        fillRoundedRect(gameOverRestartRect.x, gameOverRestartRect.y, gameOverRestartRect.w, gameOverRestartRect.h, 12);
        ctx.fillStyle = "#2a1b08";
        ctx.textAlign = "center";
        ctx.font = "bold 14px " + UI_FONT;
        ctx.fillText("Fly Again", gameOverRestartRect.x + gameOverRestartRect.w / 2, gameOverRestartRect.y + 23);

        ctx.fillStyle = "rgba(31, 39, 51, 0.92)";
        fillRoundedRect(gameOverMenuRect.x, gameOverMenuRect.y, gameOverMenuRect.w, gameOverMenuRect.h, 12);
        ctx.fillStyle = "#f8edcf";
        ctx.fillText("Main Menu", gameOverMenuRect.x + gameOverMenuRect.w / 2, gameOverMenuRect.y + 23);

        ctx.font = "11px " + UI_FONT;
        ctx.fillStyle = "rgba(255, 244, 214, 0.74)";
        ctx.fillText("SPACE to restart • ESC for menu", W / 2, modalY + modalH - 14);
      }
    }

    function drawImageCover(asset, x, y, w, h) {
      if (!asset || !asset.loaded) return false;

      const iw = asset.img.width;
      const ih = asset.img.height;
      const scale = Math.max(w / iw, h / ih);
      const drawW = iw * scale;
      const drawH = ih * scale;
      const dx = x + (w - drawW) / 2;
      const dy = y + (h - drawH) / 2;
      ctx.drawImage(asset.img, dx, dy, drawW, drawH);
      return true;
    }

    function drawSplashBadge(asset, cx, cy, size, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;

      if (asset && asset.loaded) {
        const scale = Math.min(size / asset.img.width, size / asset.img.height);
        const imgW = asset.img.width * scale;
        const imgH = asset.img.height * scale;
        ctx.drawImage(asset.img, cx - imgW / 2, cy - imgH / 2, imgW, imgH);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.33, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawSplashBadgeHalo(cx, cy, radius) {
      const halo = ctx.createRadialGradient(cx, cy, radius * 0.18, cx, cy, radius);
      halo.addColorStop(0, "rgba(255, 250, 244, 0.92)");
      halo.addColorStop(0.55, "rgba(255, 248, 236, 0.5)");
      halo.addColorStop(1, "rgba(255, 248, 236, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function getHangarEntries(faction) {
      return HANGAR_DATA[faction] || [];
    }

    function getHangarSpecialEntries(faction) {
      return HANGAR_SPECIALS[faction] || [];
    }

    function getActiveHangarEntries() {
      return currentHangarSection === "special"
        ? getHangarSpecialEntries(currentHangarFaction)
        : getHangarEntries(currentHangarFaction);
    }

    function getHangarDisplaySprite(entry) {
      if (!entry) return null;
      if (currentHangarSection === "special") {
        const sizeMetrics = getPlaneSizeMetrics(entry.basePlaneType);
        const rotation = entry.basePlaneType === "dr1std" ? Math.PI / 36 : 0;
        return {
          img: entry.asset.img,
          loaded: entry.asset.loaded,
          rotation,
          ...sizeMetrics
        };
      }
      return getPlaneSprite(entry.planeType);
    }

    function ensureHangarSelection() {
      const entries = getActiveHangarEntries();
      const keyField = currentHangarSection === "special" ? "id" : "planeType";
      if (!entries.some(entry => entry[keyField] === selectedHangarPlaneType)) {
        selectedHangarPlaneType = entries[0]?.[keyField] || null;
      }
    }

    function isCampaignUnlocked(node) {
      // Order-1 campaigns are always available as the starting point
      if (node.order < FIRST_LOCKED_CAMPAIGN_ORDER) return true;
      // Each subsequent campaign unlocks when the campaign immediately before it (order - 1) is completed
      const prerequisiteNode = CAMPAIGN_MAP_NODES.find(n => n.order === node.order - 1);
      if (!prerequisiteNode) return false;
      return completedCampaigns.includes(prerequisiteNode.id);
    }

      return CAMPAIGNS.some(campaign => campaign.id === node.id);

    function getCampaignMapDrawMetrics() {
      const viewport = { x: 16, y: 72, w: W - 32, h: H - 210 };
      const fitScale = Math.max(viewport.w / campaignMapAsset.img.width, viewport.h / campaignMapAsset.img.height);
      const scale = fitScale * 1.28;
      const drawW = campaignMapAsset.img.width * scale;
      const drawH = campaignMapAsset.img.height * scale;
      const minPanX = Math.min(0, viewport.w - drawW);
      const minPanY = Math.min(0, viewport.h - drawH);
      return { viewport, scale, drawW, drawH, minPanX, minPanY };
    }

    function clampCampaignMapPan() {
      if (!campaignMapAsset.loaded) return;
      const { minPanX, minPanY } = getCampaignMapDrawMetrics();
      campaignMapPanX = Math.min(0, Math.max(minPanX, campaignMapPanX));
      campaignMapPanY = Math.min(0, Math.max(minPanY, campaignMapPanY));
    }

      campaignMapPanX = 0;
      campaignMapPanY = 0;

    // drawWrappedText — shared helper used by every screen that renders variable-length text.
    // Returns the number of lines actually drawn so callers can advance their y-cursor.
    function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines = 99) {
      const words = String(text || "").split(/\s+/);
      const lines = [];
      let current = "";

      for (const word of words) {
        const next = current ? `${current} ${word}` : word;
        if (ctx.measureText(next).width <= maxWidth || !current) {
          current = next;
        } else {
          lines.push(current);
          current = word;
        }
      }
      if (current) lines.push(current);

      const visible = lines.slice(0, maxLines);
      visible.forEach((line, index) => {
        ctx.fillText(line, x, y + index * lineHeight);
      });
      return visible.length;
    }

    // drawScrollableDescPanel — renders multi-line text inside a clipped panel with
    // a drag-scroll offset and a thin scroll-indicator bar on the right edge.
    // Returns the total content height so the caller can store scrollMax.
    function drawScrollableDescPanel(text, panelX, panelY, panelW, panelH, scrollY) {
      const fontSize = 12;
      const lineH = 18;
      const padLeft = 0;
      const padTop = 4;

      // Measure wrapped lines using the current ctx font (caller must set it)
      const words = String(text || "").split(/\s+/);
      const lines = [];
      let current = "";
      for (const word of words) {
        const next = current ? `${current} ${word}` : word;
        if (ctx.measureText(next).width <= panelW - padLeft || !current) {
          current = next;
        } else {
          lines.push(current);
          current = word;
        }
      }
      if (current) lines.push(current);

      const totalContentH = padTop + lines.length * lineH;

      // Clip to panel bounds
      ctx.save();
      ctx.beginPath();
      ctx.rect(panelX, panelY, panelW, panelH);
      ctx.clip();

      // Draw lines offset by scrollY
      lines.forEach((line, i) => {
        const lineY = panelY + padTop + i * lineH - scrollY;
        if (lineY + lineH < panelY || lineY > panelY + panelH) return; // out of view
        ctx.fillText(line, panelX + padLeft, lineY + fontSize);
      });

      // Downward fade + chevron when more content is below
      if (scrollY < totalContentH - panelH - 2) {
        const fadeH = 22;
        const grad = ctx.createLinearGradient(0, panelY + panelH - fadeH, 0, panelY + panelH);
        grad.addColorStop(0, "rgba(245, 236, 217, 0)");
        grad.addColorStop(1, "rgba(245, 236, 217, 0.88)");
        ctx.fillStyle = grad;
        ctx.fillRect(panelX, panelY + panelH - fadeH, panelW, fadeH);

        // Down chevron
        ctx.strokeStyle = "rgba(74, 57, 37, 0.72)";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        const chev = { cx: panelX + panelW / 2, cy: panelY + panelH - 5 };
        ctx.moveTo(chev.cx - 6, chev.cy - 3);
        ctx.lineTo(chev.cx, chev.cy + 3);
        ctx.lineTo(chev.cx + 6, chev.cy - 3);
        ctx.stroke();
      }

      ctx.restore();

      // Scroll indicator bar on right edge (only when content overflows)
      if (totalContentH > panelH) {
        const barX = panelX + panelW + 3;
        const barTrackH = panelH;
        const thumbRatio = Math.min(1, panelH / totalContentH);
        const thumbH = Math.max(20, barTrackH * thumbRatio);
        const thumbY = panelY + (scrollY / (totalContentH - panelH)) * (barTrackH - thumbH);

        ctx.save();
        ctx.fillStyle = "rgba(74, 57, 37, 0.18)";
        ctx.beginPath();
        ctx.roundRect(barX, panelY, 4, barTrackH, 2);
        ctx.fill();
        ctx.fillStyle = "rgba(74, 57, 37, 0.52)";
        ctx.beginPath();
        ctx.roundRect(barX, thumbY, 4, thumbH, 2);
        ctx.fill();
        ctx.restore();
      }

      return totalContentH;
    }

    // drawTruncatedText — draws a single line, truncating with "…" if it exceeds maxWidth.
    function drawTruncatedText(text, x, y, maxWidth) {
      const str = String(text || "");
      if (ctx.measureText(str).width <= maxWidth) {
        ctx.fillText(str, x, y);
        return;
      }
      let truncated = str;
      while (truncated.length > 0 && ctx.measureText(truncated + "\u2026").width > maxWidth) {
        truncated = truncated.slice(0, -1);
      }
      ctx.fillText(truncated + "\u2026", x, y);
    }

    function formatRunDuration(ms) {
      const totalSeconds = Math.max(0, Math.round((ms || 0) / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes > 0 ? `${minutes}m ${String(seconds).padStart(2, "0")}s` : `${seconds}s`;
    }

      ctx.strokeStyle = "rgba(34, 20, 10, 0.82)";
      ctx.lineWidth = 3.2;
      ctx.font = "24px " + UI_FONT;
      ctx.strokeText("Tester Briefing", W / 2, panelY + 34);
      ctx.fillText("Tester Briefing", W / 2, panelY + 34);

      ctx.fillStyle = "#f7e2b1";
      ctx.font = "13px " + UI_FONT;
      // Header line can be long — wrap it with 16px padding each side
      ctx.textAlign = "left";
      drawWrappedText(
        "Thanks for the feedback. This build includes the latest fixes and improvements:",
        panelX + 16, panelY + 58, panelW - 32, 17, 2
      );

      ctx.textAlign = "left";
      ctx.fillStyle = "#fff4d5";
      ctx.font = "13px " + UI_FONT;
      const bulletX = panelX + 24;
      const textX = bulletX + 18;
      const startY = panelY + 98;
      const notes = [
        "Cleaner Belgium encounter ladder with same-tier fighters, gentler flak buildup, a balloon phase, and an elite finish.",
        "Aircraft handling rebalanced so early planes are more forgiving, while later aircraft now feel more distinct.",
        "Your Best score is now separate from Top Ace, updates more reliably, and is shown more prominently.",
        "New game-over patrol report with run stats plus clear Fly Again and Main Menu actions.",
        "Added Settings screen and moved the fire-button hand preference there for left- and right-handed pilots."
      ];

      // Advance y dynamically so wrapped bullets never overlap each other
      let bulletCursorY = startY;
      const bulletLineH = 17;
      const bulletGutter = 10; // extra space between bullets
      notes.forEach((note) => {
        ctx.fillStyle = "#ffe08a";
        ctx.font = "18px " + UI_FONT;
        ctx.fillText("\u2022", bulletX, bulletCursorY);
        ctx.fillStyle = "#fff4d5";
        ctx.font = "13px " + UI_FONT;
        const linesDrawn = drawWrappedText(note, textX, bulletCursorY, panelW - 62, bulletLineH, 3);
        bulletCursorY += Math.max(linesDrawn, 1) * bulletLineH + bulletGutter;
      });

      testerNotesContinueRect = { x: W / 2 - 82, y: panelY + panelH - 54, w: 164, h: 36 };
      ctx.fillStyle = "rgba(214, 174, 86, 0.96)";
      fillRoundedRect(testerNotesContinueRect.x, testerNotesContinueRect.y, testerNotesContinueRect.w, testerNotesContinueRect.h, 12);
      ctx.fillStyle = "#2a1b08";
      ctx.textAlign = "center";
      ctx.font = "bold 14px " + UI_FONT;
      ctx.fillText("Continue", W / 2, testerNotesContinueRect.y + 23);

      ctx.fillStyle = "rgba(255, 244, 214, 0.74)";
      ctx.font = "11px " + UI_FONT;
      ctx.fillText("Tap Continue or press SPACE", W / 2, panelY + panelH - 14);

      hintEl.textContent = TESTER_NOTES_HINT;
    }

    // Draw a miniature RFC roundel centred at (cx, cy) with outer radius r.
    // Used for both node markers and the faction toggle button icon.
    // Ring proportions (per art brief at 11px node radius):
    //   blue fills to r, white ring 3px wide (r-3), red centre 5px radius.
    //   Scaled proportionally when r differs.
    function drawRFCRoundel(cx, cy, r) {
      const whiteR = Math.max(2, r - 3);
      const redR   = Math.max(1, Math.round(r * (5 / 11)));
      // Outer blue ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = "#2A4C7A";
      ctx.fill();
      // White ring
      ctx.beginPath();
      ctx.arc(cx, cy, whiteR, 0, Math.PI * 2);
      ctx.fillStyle = "#EDE8DC";
      ctx.fill();
      // Red centre
      ctx.beginPath();
      ctx.arc(cx, cy, redR, 0, Math.PI * 2);
      ctx.fillStyle = "#B82020";
      ctx.fill();
    }

    // Draw a miniature Iron Cross centred at (cx, cy) inside a circle of radius r.
    // Used for both node markers and the faction toggle button icon.
    function drawIronCross(cx, cy, r, armWidth) {
      // White/cream background circle
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = "#EDE8DC";
      ctx.fill();
      // Cross arms
      ctx.fillStyle = "#1C1A18";
      // Vertical arm
      ctx.fillRect(cx - armWidth / 2, cy - r + 1, armWidth, r * 2 - 2);
      // Horizontal arm
      ctx.fillRect(cx - r + 1, cy - armWidth / 2, r * 2 - 2, armWidth);
    }

    function drawCampaignMap() {
      if (screen !== "campaignMap") return;
      updateOverlayVisibility();

      // ---- Canvas background: parchment fill ----
      ctx.clearRect(0, 0, W, H);
      // Use the production BG image when loaded; fall back to flat parchment fill.
      // To swap in the real image: ensure campaignMapBG loads from the correct path — no other change needed.
      if (campaignMapBG.loaded) {
        ctx.drawImage(campaignMapBG.img, 0, 0, W, H);
      } else {
        ctx.fillStyle = "#F6EEDC";
        ctx.fillRect(0, 0, W, H);
      }

      // Subtle vignette overlay for depth
      const topShade = ctx.createLinearGradient(0, 0, 0, H);
      topShade.addColorStop(0, "rgba(30, 24, 16, 0.16)");
      topShade.addColorStop(0.6, "rgba(255,255,255,0)");
      topShade.addColorStop(1, "rgba(20, 18, 16, 0.18)");
      ctx.fillStyle = topShade;
      ctx.fillRect(0, 0, W, H);

      // ---- Header: title ----
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff1c8";
      ctx.strokeStyle = "rgba(34, 20, 10, 0.82)";
      ctx.lineWidth = 3.4;
      ctx.font = "24px " + UI_FONT;
      ctx.strokeText("Campaign Map", W / 2, 44);
      ctx.fillText("Campaign Map", W / 2, 44);

      // ---- Header: Back button ----
      campaignMapBackRect = { x: 18, y: 18, w: 78, h: 30 };
      ctx.fillStyle = "rgba(26, 22, 17, 0.72)";
      fillRoundedRect(campaignMapBackRect.x, campaignMapBackRect.y, campaignMapBackRect.w, campaignMapBackRect.h, 12);
      ctx.fillStyle = "#fff0c8";
      ctx.font = "13px " + UI_FONT;
      ctx.fillText("Back", campaignMapBackRect.x + campaignMapBackRect.w / 2, 38);

      // ---- Header: Faction toggle buttons ----
      // Two 52×30px buttons at x: W−122, y: 20, with a 6px gap between them.
      const btnW = 52, btnH = 30, btnGap = 6;
      const btnBritX = W - 122;
      const btnGerX = btnBritX + btnW + btnGap;
      const btnY = 20;

      mapFactionBritishRect = { x: btnBritX, y: btnY, w: btnW, h: btnH };
      mapFactionGermanRect  = { x: btnGerX,  y: btnY, w: btnW, h: btnH };

      // British button
      ctx.save();
      const britActive = mapFaction === "british";
      ctx.fillStyle = britActive ? "#2A4C7A" : "rgba(42, 76, 122, 0.38)";
      fillRoundedRect(btnBritX, btnY, btnW, btnH, 10);
      ctx.strokeStyle = "#1E1A14";
      ctx.lineWidth = 1.5;
      strokeRoundedRect(btnBritX, btnY, btnW, btnH, 10);
      if (britActive) {
        // Brass Gold active border
        ctx.strokeStyle = "#D4A832";
        ctx.lineWidth = 1.5;
        strokeRoundedRect(btnBritX - 1, btnY - 1, btnW + 2, btnH + 2, 11);
      }
      // Miniature RFC roundel icon centred in button
      drawRFCRoundel(btnBritX + btnW / 2, btnY + btnH / 2, 9);
      ctx.restore();

      // German button
      ctx.save();
      const gerActive = mapFaction === "german";
      ctx.fillStyle = gerActive ? "#1C1A18" : "rgba(28, 26, 24, 0.38)";
      fillRoundedRect(btnGerX, btnY, btnW, btnH, 10);
      ctx.strokeStyle = "#1E1A14";
      ctx.lineWidth = 1.5;
      strokeRoundedRect(btnGerX, btnY, btnW, btnH, 10);
      if (gerActive) {
        ctx.strokeStyle = "#D4A832";
        ctx.lineWidth = 1.5;
        strokeRoundedRect(btnGerX - 1, btnY - 1, btnW + 2, btnH + 2, 11);
      }
      // Miniature Iron Cross icon centred in button (arm width 3px at this scale)
      drawIronCross(btnGerX + btnW / 2, btnY + btnH / 2, 9, 3);
      ctx.restore();

      // ---- Map viewport ----
      const viewport = { x: 16, y: 72, w: W - 32, h: H - 210 };
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(viewport.x + 18, viewport.y);
      ctx.lineTo(viewport.x + viewport.w - 18, viewport.y);
      ctx.quadraticCurveTo(viewport.x + viewport.w, viewport.y, viewport.x + viewport.w, viewport.y + 18);
      ctx.lineTo(viewport.x + viewport.w, viewport.y + viewport.h - 18);
      ctx.quadraticCurveTo(viewport.x + viewport.w, viewport.y + viewport.h, viewport.x + viewport.w - 18, viewport.y + viewport.h);
      ctx.lineTo(viewport.x + 18, viewport.y + viewport.h);
      ctx.quadraticCurveTo(viewport.x, viewport.y + viewport.h, viewport.x, viewport.y + viewport.h - 18);
      ctx.lineTo(viewport.x, viewport.y + 18);
      ctx.quadraticCurveTo(viewport.x, viewport.y, viewport.x + 18, viewport.y);
      ctx.closePath();
      ctx.clip();

      if (campaignMapAsset.loaded) {
        clampCampaignMapPan();
        const metrics = getCampaignMapDrawMetrics();
        const drawX = metrics.viewport.x + campaignMapPanX;
        const drawY = metrics.viewport.y + campaignMapPanY;

        ctx.drawImage(campaignMapAsset.img, drawX, drawY, metrics.drawW, metrics.drawH);

        // ---- Node markers: 5 visual states ----
        // State resolution per node:
        //   locked          — isCampaignUnlocked() returns false
        //   brit_complete   — completedCampaigns (British) contains the node id
        //   ger_complete    — completedCampaignsGerman (German) contains the node id
        //   both_complete   — both of the above
        //   selected        — node.id === selectedCampaignMapId (applied to unlocked/completed states)
        //   default         — unlocked, not completed for either faction
        campaignMarkerRects = [];
        CAMPAIGN_MAP_NODES.forEach((node) => {
          const px = drawX + node.mapX * metrics.drawW;
          const py = drawY + node.mapY * metrics.drawH;
          const unlocked = isCampaignUnlocked(node);
          const britDone  = completedCampaigns.includes(node.id);
          const gerDone   = completedCampaignsGerman.has(node.id);
          const bothDone  = britDone && gerDone;
          const selected  = node.id === selectedCampaignMapId;
          const radius    = selected ? 14 : 11;   // 28px / 22px diameter as spec'd

          ctx.save();

          if (!unlocked) {
            // ---- STATE: Locked ----
            ctx.globalAlpha = 0.60;
            ctx.fillStyle = "#7A7268";
            ctx.strokeStyle = "rgba(30, 26, 20, 0.60)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Order number at 40% opacity
            ctx.globalAlpha = 0.40;
            ctx.fillStyle = "#EDE8DC";
            ctx.font = "bold 11px " + UI_FONT;
            ctx.textAlign = "center";
            ctx.fillText(String(node.order), px, py + 4);

          } else if (bothDone) {
            // ---- STATE: Both factions completed ----
            // Split circle: left half RFC blue, right half Feldgrau
            const r = radius;
            ctx.strokeStyle = "#1E1A14";
            ctx.lineWidth = 2.5;
            // Left half — RFC blue
            ctx.beginPath();
            ctx.moveTo(px, py - r);
            ctx.arc(px, py, r, -Math.PI / 2, Math.PI / 2, true);
            ctx.closePath();
            ctx.fillStyle = "#2A4C7A";
            ctx.fill();
            // Right half — Feldgrau
            ctx.beginPath();
            ctx.moveTo(px, py - r);
            ctx.arc(px, py, r, -Math.PI / 2, Math.PI / 2, false);
            ctx.closePath();
            ctx.fillStyle = "#6B7A62";
            ctx.fill();
            // Full outline
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.stroke();
            // Left half: thin roundel ring mark (1.5px cream)
            ctx.strokeStyle = "#EDE8DC";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(px, py, r - 4, -Math.PI / 2, Math.PI / 2, true);
            ctx.stroke();
            // Right half: thin cross mark (1.5px cream)
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#EDE8DC";
            ctx.beginPath();
            ctx.moveTo(px, py - (r - 4));
            ctx.lineTo(px, py + (r - 4));
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(px + 2, py);
            ctx.lineTo(px + (r - 4), py);
            ctx.stroke();
            if (selected) {
              ctx.strokeStyle = "#EDE8DC";
              ctx.lineWidth = 3.2;
              ctx.beginPath();
              ctx.arc(px, py, r + 2, 0, Math.PI * 2);
              ctx.stroke();
            }

          } else if (britDone) {
            // ---- STATE: British (RFC) completed ----
            drawRFCRoundel(px, py, radius);
            ctx.strokeStyle = "#1E1A14";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.stroke();
            if (selected) {
              ctx.strokeStyle = "#EDE8DC";
              ctx.lineWidth = 3.2;
              ctx.beginPath();
              ctx.arc(px, py, radius + 2, 0, Math.PI * 2);
              ctx.stroke();
            }

          } else if (gerDone) {
            // ---- STATE: German (Iron Cross) completed ----
            drawIronCross(px, py, radius, 6);
            ctx.strokeStyle = "#1E1A14";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.stroke();
            if (selected) {
              ctx.strokeStyle = "#EDE8DC";
              ctx.lineWidth = 3.2;
              ctx.beginPath();
              ctx.arc(px, py, radius + 2, 0, Math.PI * 2);
              ctx.stroke();
            }

          } else if (selected) {
            // ---- STATE: Selected (unlocked, not completed) ----
            ctx.fillStyle = "#D4A832";
            ctx.strokeStyle = "#EDE8DC";
            ctx.lineWidth = 3.2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#2A2016";
            ctx.font = "bold 11px " + UI_FONT;
            ctx.textAlign = "center";
            ctx.fillText(String(node.order), px, py + 4);

          } else {
            // ---- STATE: Default (unlocked, not selected, not completed) ----
            ctx.fillStyle = "#D4A832";
            ctx.strokeStyle = "rgba(30, 26, 20, 0.86)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#2A2016";
            ctx.font = "bold 11px " + UI_FONT;
            ctx.textAlign = "center";
            ctx.fillText(String(node.order), px, py + 4);
          }

          ctx.restore();

          // ---- Node label below marker ----
          // 4px gap below marker bottom, 11px serif, Aged Ink colour
          ctx.save();
          ctx.textAlign = "center";
          ctx.font = (selected ? "bold " : "") + "11px " + UI_FONT;
          ctx.fillStyle = "#2A2016";
          ctx.globalAlpha = unlocked ? 1 : 0.55;
          ctx.fillText(node.label, px, py + radius + 4 + 11);
          ctx.restore();

          // ---- Hit rect: minimum 44×44px centred on node ----
          campaignMarkerRects.push({
            id: node.id,
            x: px - 22,
            y: py - 22,
            w: 44,
            h: 44
          });
        });
      } else {
        // Map asset not loaded — flat parchment placeholder inside viewport
        ctx.fillStyle = "#F6EEDC";
        fillRoundedRect(viewport.x + 20, viewport.y + 20, viewport.w - 40, viewport.h - 40, 18);
      }
      ctx.restore();

      // Viewport border
      ctx.strokeStyle = "rgba(52, 34, 16, 0.3)";
      ctx.lineWidth = 1.4;
      ctx.strokeRect(viewport.x + 0.5, viewport.y + 0.5, viewport.w - 1, viewport.h - 1);

      // ---- Info panel: parchment background ----
      const infoY = H - 122;
      const infoH = 96;
      ctx.fillStyle = "rgba(246, 238, 220, 0.96)";
      fillRoundedRect(16, infoY, W - 32, infoH, 18);
      // Subtle ink border
      ctx.strokeStyle = "rgba(76, 58, 35, 0.22)";
      ctx.lineWidth = 1;
      strokeRoundedRect(16, infoY, W - 32, infoH, 18);

      const selectedNode = getCampaignMapNode();
      const unlocked = isCampaignUnlocked(selectedNode);
      const implemented = isCampaignImplemented(selectedNode);

      ctx.textAlign = "left";
      // Battle name: Aged Ink #2A2016, 17px bold serif
      ctx.fillStyle = "#2A2016";
      ctx.font = "bold 17px " + UI_FONT;
      const infoTextW = W - 32 - 130; // reserve space for Fly button
      drawTruncatedText(`${selectedNode.order}. ${selectedNode.label}`, 30, infoY + 26, infoTextW);

      // Subtitle and front: Faded Khaki #604D3A, 12px serif
      ctx.fillStyle = "#604D3A";
      ctx.font = "12px " + UI_FONT;
      drawTruncatedText(selectedNode.subtitle, 30, infoY + 46, infoTextW);
      drawTruncatedText(selectedNode.front, 30, infoY + 64, infoTextW);

      // Status label: green tint if unlocked, amber if not
      const statusLabel = !unlocked
        ? "Locked - opens in historical order"
        : implemented
          ? "Playable now"
          : "Mapped - content to come";
      ctx.fillStyle = unlocked ? "rgba(207, 244, 186, 0.95)" : "rgba(255, 220, 181, 0.95)";
      ctx.font = "12px " + UI_FONT;
      drawTruncatedText(statusLabel, 30, infoY + 82, infoTextW);

      // ---- Fly button: Brass Gold #D4A832 ----
      campaignMapStartRect = null;
      if (unlocked && implemented) {
        campaignMapStartRect = { x: W - 138, y: infoY + 24, w: 100, h: 38 };
        ctx.fillStyle = "#D4A832";
        fillRoundedRect(campaignMapStartRect.x, campaignMapStartRect.y, campaignMapStartRect.w, campaignMapStartRect.h, 14);
        ctx.strokeStyle = "rgba(67, 46, 16, 0.92)";
        ctx.lineWidth = 1.5;
        strokeRoundedRect(campaignMapStartRect.x, campaignMapStartRect.y, campaignMapStartRect.w, campaignMapStartRect.h, 14);
        ctx.fillStyle = "#2A2016";
        ctx.textAlign = "center";
        ctx.font = "bold 14px " + UI_FONT;
        ctx.fillText("Fly", campaignMapStartRect.x + campaignMapStartRect.w / 2, campaignMapStartRect.y + 24);
      }

      ctx.textAlign = "center";
      hintEl.textContent = "Drag the map and tap a campaign marker";
    }

    // ---------- SPLASH SCREEN ----------
    function drawSplash() {
      if (screen !== "splash") return;
      updateOverlayVisibility();

      ctx.clearRect(0, 0, W, H);
      if (!drawImageCover(menuBackground, 0, 0, W, H)) {
        ctx.fillStyle = "#fdfaf3";
        ctx.fillRect(0, 0, W, H);
      }

      const topShade = ctx.createLinearGradient(0, 0, 0, H);
      topShade.addColorStop(0, "rgba(12, 19, 32, 0.42)");
      topShade.addColorStop(0.25, "rgba(12, 19, 32, 0.08)");
      topShade.addColorStop(0.72, "rgba(255, 245, 230, 0)");
      topShade.addColorStop(1, "rgba(20, 18, 16, 0.28)");
      ctx.fillStyle = topShade;
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = "center";

      // Title
      ctx.font = "28px " + UI_FONT;
      ctx.fillStyle = "#fff7dc";
      ctx.strokeStyle = "rgba(36, 24, 12, 0.75)";
      ctx.lineWidth = 4;
      ctx.strokeText(GAME_TITLE, W / 2, H * 0.11);
      ctx.fillText(GAME_TITLE, W / 2, H * 0.11);

      ctx.font = "18px " + UI_FONT;
      ctx.fillStyle = "#f5e6b7";
      ctx.strokeStyle = "rgba(49, 35, 18, 0.78)";
      ctx.lineWidth = 3.2;
      ctx.strokeText("Choose your side", W / 2, H * 0.34 + 6);
      ctx.fillText("Choose your side", W / 2, H * 0.34 + 6);

      const menuButtonY = H * 0.73;
      const menuButtonW = 96;
      const menuButtonGap = 12;
      const menuRowW = menuButtonW * 3 + menuButtonGap * 2;
      const menuStartX = (W - menuRowW) / 2;
      campaignMapEntryRect = { x: menuStartX, y: menuButtonY, w: menuButtonW, h: 36 };
      settingsEntryRect = { x: menuStartX + menuButtonW + menuButtonGap, y: menuButtonY, w: menuButtonW, h: 36 };
      hangarEntryRect = { x: menuStartX + (menuButtonW + menuButtonGap) * 2, y: menuButtonY, w: menuButtonW, h: 36 };
      ctx.fillStyle = "rgba(24, 20, 16, 0.72)";
      fillRoundedRect(campaignMapEntryRect.x, campaignMapEntryRect.y, campaignMapEntryRect.w, campaignMapEntryRect.h, 12);
      ctx.fillStyle = "#fff2cb";
      ctx.font = "14px " + UI_FONT;
      ctx.fillText("Campaigns", campaignMapEntryRect.x + campaignMapEntryRect.w / 2, campaignMapEntryRect.y + 23);

      ctx.fillStyle = "rgba(24, 20, 16, 0.72)";
      fillRoundedRect(settingsEntryRect.x, settingsEntryRect.y, settingsEntryRect.w, settingsEntryRect.h, 12);
      ctx.fillStyle = "#fff2cb";
      ctx.font = "14px " + UI_FONT;
      ctx.fillText("Settings", settingsEntryRect.x + settingsEntryRect.w / 2, settingsEntryRect.y + 23);

      ctx.fillStyle = "rgba(24, 20, 16, 0.72)";
      fillRoundedRect(hangarEntryRect.x, hangarEntryRect.y, hangarEntryRect.w, hangarEntryRect.h, 12);
      ctx.fillStyle = "#fff2cb";
      ctx.font = "14px " + UI_FONT;
      ctx.fillText("Hangar", hangarEntryRect.x + hangarEntryRect.w / 2, hangarEntryRect.y + 23);

      const iconSize = 72;
      const iconY = H * 0.61;
      const britishX = W * 0.27;
      const germanX = W * 0.73;
      const badgeHitSize = 110;

      britishEntryRect = {
        x: britishX - badgeHitSize / 2,
        y: iconY - badgeHitSize / 2 - 10,
        w: badgeHitSize,
        h: badgeHitSize
      };
      germanEntryRect = {
        x: germanX - badgeHitSize / 2,
        y: iconY - badgeHitSize / 2 - 10,
        w: badgeHitSize,
        h: badgeHitSize
      };

      drawSplashBadgeHalo(britishX, iconY - 10, 48);
      drawSplashBadgeHalo(germanX, iconY - 10, 48);
      drawSplashBadge(britishRoundel, britishX, iconY - 12, iconSize);
      drawSplashBadge(germanCross, germanX, iconY - 12, iconSize);

      const labelY = iconY + 46;
      const labelW = 156;
      const labelH = 26;

      ctx.fillStyle = "rgba(28, 22, 16, 0.44)";
      fillRoundedRect(britishX - labelW / 2, labelY - 18, labelW, labelH, 11);
      fillRoundedRect(germanX - labelW / 2, labelY - 18, labelW, labelH, 11);

      ctx.fillStyle = "#fff4d1";
      ctx.font = "14px " + UI_FONT;
      ctx.strokeStyle = "rgba(22, 14, 9, 0.72)";
      ctx.lineWidth = 2.4;
      ctx.strokeText("Royal Flying Corps", britishX, labelY);
      ctx.strokeText("German Air Service", germanX, labelY);
      ctx.fillText("Royal Flying Corps", britishX, labelY);
      ctx.fillText("German Air Service", germanX, labelY);

      const stripY = H * 0.81;
      const stripH = 116;
      const stripX = 58;
      const stripW = W - 116;
      ctx.fillStyle = "rgba(28, 36, 46, 0.34)";
      fillRoundedRect(stripX, stripY, stripW, stripH, 22);

      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255, 247, 226, 0.95)";
      ctx.font = "15px " + UI_FONT;
      const playerBest = getCurrentPilotBestScore();
      const playerBestLine = currentPilotName
        ? `${currentPilotName} - ${playerBest ?? 0}`
        : "Fly your first patrol to record it";
      const aceLine = formatTopAceLine();
      // Left column of strip ends before the "More nations ahead" section (~50% of stripW)
